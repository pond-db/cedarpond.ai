<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Space Ball | Cedar Pond AI</title>
  <style>
    :root {
      color-scheme: dark;
      --ui-shadow: rgba(0, 0, 0, 0.25);
      --font-display: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050815;
      font-family: var(--font-display);
      touch-action: manipulation;
    }

    body {
      display: grid;
      place-items: center;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>

      function emptyPowerupCounts() {
        return {
          shield: 0,

      }

      function emptyPowerupFlags() {
        return {
          shield: false,

      function loadUpgrades() {
        const fallback = emptyPowerupCounts();
        try {
          const raw = localStorage.getItem(UPGRADES_STORAGE_KEY);
          if (!raw) {
            return fallback;
          }
          const parsed = JSON.parse(raw);
          const loaded = Object.assign({}, fallback);
          for (const key of Object.keys(loaded)) {
            const value = parsed[key];
            if (typeof value === "number" && Number.isFinite(value)) {
              loaded[key] = Math.max(0, Math.floor(value));
            } else if (typeof value === "boolean") {
              loaded[key] = value ? 1 : 0;
            }
          }
          return loaded;
        } catch (error) {
          return fallback;
        }
      }

      function saveDiamonds() {
        localStorage.setItem(DIAMONDS_STORAGE_KEY, String(state.diamonds));
      }

      function saveUpgrades() {
        localStorage.setItem(UPGRADES_STORAGE_KEY, JSON.stringify(state.powerupInventory));
      }

      function generateGameCode() {
        let code = "";
        for (let i = 0; i < 15; i += 1) {
          code += Math.floor(Math.random() * 10);
        }
        return code;
      }

      function codeColorPair(code) {
        const numericValue = code.split("").reduce((sum, digit) => sum + Number(digit), 0);
        return GUEST_COLOR_PAIRS[numericValue % GUEST_COLOR_PAIRS.length];
      }

      function awardDiamonds(amount) {
        if (amount <= 0) {
          return;
        }
        state.diamonds += amount;
        state.runDiamondsEarned += amount;
        saveDiamonds();
      }

      function setMenuNotice(message) {
        state.menuNotice = message;
      }

      function formatDiamonds(value) {
        return Number(value).toLocaleString(undefined, {
          minimumFractionDigits: 0,
          maximumFractionDigits: 0
        });
      }

      function buyUpgrade(upgradeId) {
        const item = SHOP_ITEMS.find((shopItem) => shopItem.id === upgradeId);
        if (!item) {
          return;
        }
        if (state.selectedPowerups[upgradeId]) {
          state.selectedPowerups[upgradeId] = false;
          setMenuNotice(item.label + " removed from the next level.");
          return;
        }
        if (state.powerupInventory[upgradeId] > 0) {
          state.selectedPowerups[upgradeId] = true;
          setMenuNotice(item.label + " armed for the next level.");
          return;
        }
        if (state.diamonds + 0.0001 < item.cost) {
          setMenuNotice("Need " + formatDiamonds(item.cost) + " diamonds for " + item.label + ".");
          return;
        }
        state.diamonds -= item.cost;
        state.powerupInventory[upgradeId] += 1;
        state.selectedPowerups[upgradeId] = true;
        saveDiamonds();
        saveUpgrades();
        setMenuNotice(item.label + " bought and armed for one level.");
      }

      function prepareRunPowerups() {
        state.activePowerups = emptyPowerupFlags();
        state.runShieldReady = false;
        for (const item of SHOP_ITEMS) {
          const id = item.id;
          if (state.selectedPowerups[id] && state.powerupInventory[id] > 0) {
            state.powerupInventory[id] -= 1;
            state.activePowerups[id] = true;
          }
          state.selectedPowerups[id] = false;
        }
        saveUpgrades();
        state.runShieldReady = state.activePowerups.shield;
      }

      function hostLocalRoom() {
        state.hostCode = generateGameCode();
        setMenuNotice("Local host code ready: " + state.hostCode);
      }

      function addJoinedGuest(code) {
        const pair = codeColorPair(code);
        state.joinedGuests.push({
          code,
          colors: pair,
          orbitOffset: rand(0, Math.PI * 2),
          pulseOffset: rand(0, Math.PI * 2)
        });
        if (state.joinedGuests.length > GAME.maxJoinedGuests) {
          state.joinedGuests.shift();
        }

        }

          return;

        addJoinedGuest(code);
        setMenuNotice("Guest joined with flashing colors from code " + code + ".");

      const HARD_PATTERN_INDICES = patterns
        .map((pattern, index) => SAFE_PATTERN_KINDS.has(pattern.kind) ? -1 : index)
        .filter((index) => index >= 0);

      const EXTREME_PATTERN_INDICES = patterns
        .map((pattern, index) => EXTREME_PATTERN_KINDS.has(pattern.kind) ? index : -1)
        .filter((index) => index >= 0);

      function resize() {
        state.width = window.innerWidth;
        state.height = window.innerHeight;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(state.width * dpr);
        canvas.height = Math.round(state.height * dpr);
        canvas.style.width = state.width + "px";
        canvas.style.height = state.height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        state.scale = Math.min(state.width / GAME.baseWidth, state.height / GAME.baseHeight);
        rebuildBackgroundParticles();
        if (state.state !== "playing") {
          resetPlayerPosition();
        }
      }

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function difficultyLevel() {
        return clamp(state.timeAlive / GAME.difficultyRampSeconds, 0, 1);
      }

      function selectedDifficultyId() {
        return DIFFICULTY_ALLOWED_KINDS[state.selectedDifficulty] ? state.selectedDifficulty : "middle";
      }

      function selectedDifficultyLabel() {
        const option = DIFFICULTY_OPTIONS.find((entry) => entry.id === selectedDifficultyId());
        return option ? option.label : "Middle";
      }

      function diamondRewardForDifficulty() {
        const difficultyId = selectedDifficultyId();
        if (difficultyId === "easy") {
          return { scoreStep: 10000, diamonds: 1 };
        }
        if (difficultyId === "middle") {
          return { scoreStep: 1000, diamonds: 1 };
        }
        if (difficultyId === "hard") {
          return { scoreStep: 100, diamonds: 1 };
        }
        if (difficultyId === "difficlt") {
          return { scoreStep: 50, diamonds: 10 };
        }
        return { scoreStep: GAME.diamondScoreStep, diamonds: 1 };
      }

      function trackerSystemsEnabled() {
        const difficultyId = selectedDifficultyId();
        return difficultyId === "hard" || difficultyId === "difficlt";
      }

      function difficultyEligibleIndices() {
        const allowedKinds = DIFFICULTY_ALLOWED_KINDS[selectedDifficultyId()] || DIFFICULTY_ALLOWED_KINDS.middle;
        const indices = [];
        for (let i = 0; i < patterns.length; i += 1) {
          if (allowedKinds.has(patterns[i].kind)) {
            indices.push(i);
          }
        }
        return indices.length ? indices : patterns.map((_, index) => index);
      }

      function mixColor(a, b, t) {
        return {
          r: Math.round(lerp(a.r, b.r, t)),
          g: Math.round(lerp(a.g, b.g, t)),
          b: Math.round(lerp(a.b, b.b, t))
        };
      }

      function hexToRgb(hex) {
        const clean = hex.replace("#", "");
        return {
          r: parseInt(clean.slice(0, 2), 16),
          g: parseInt(clean.slice(2, 4), 16),
          b: parseInt(clean.slice(4, 6), 16)
        };
      }

      function rgbString(rgb, alpha = 1) {
        return "rgba(" + rgb.r + ", " + rgb.g + ", " + rgb.b + ", " + alpha + ")";
      }

      function getThemeBlend() {
        const from = THEMES[state.previousMode];
        const to = THEMES[state.mode];
        const t = state.modeTransition;
        return { from, to, t };
      }

      function currentPalette() {
        const blend = getThemeBlend();
        return {
          bgTop: rgbString(mixColor(hexToRgb(blend.from.bgTop), hexToRgb(blend.to.bgTop), blend.t)),
          bgBottom: rgbString(mixColor(hexToRgb(blend.from.bgBottom), hexToRgb(blend.to.bgBottom), blend.t)),
          ui: blend.t > 0.5 ? blend.to.ui : blend.from.ui,
          uiSubtle: blend.t > 0.5 ? blend.to.uiSubtle : blend.from.uiSubtle,
          platformTop: blend.t > 0.5 ? blend.to.platformTop : blend.from.platformTop,
          platformSide: blend.t > 0.5 ? blend.to.platformSide : blend.from.platformSide,
          platformGlow: blend.t > 0.5 ? blend.to.platformGlow : blend.from.platformGlow,
          spike: blend.t > 0.5 ? blend.to.spike : blend.from.spike,
          hazardGlow: blend.t > 0.5 ? blend.to.hazardGlow : blend.from.hazardGlow,
          star: blend.t > 0.5 ? blend.to.star : blend.from.star,
          orb: blend.t > 0.5 ? blend.to.orb : blend.from.orb,
          ballCore: blend.t > 0.5 ? blend.to.ballCore : blend.from.ballCore,
          ballGlow: blend.t > 0.5 ? blend.to.ballGlow : blend.from.ballGlow,
          ballEdge: blend.t > 0.5 ? blend.to.ballEdge : blend.from.ballEdge,
          fog: blend.t > 0.5 ? blend.to.fog : blend.from.fog,
          modeName: blend.t > 0.5 ? blend.to.name : blend.from.name
        };
      }

      function currentBallColors() {
        const swapIndex = Math.floor(state.timeAlive / GAME.ballSwapSeconds);
        return swapIndex % 2 === 0 ? THEMES.white : THEMES.black;
      }

      function playAreaTop() {
        return GAME.horizonMargin * state.scale;
      }

      function playAreaBottom() {
        return state.height - GAME.horizonMargin * state.scale;
      }

      function floorY() {
        return playAreaBottom() - GAME.playerRadius * state.scale;
      }

      function ceilingY() {
        return playAreaTop() + GAME.playerRadius * state.scale;
      }

      function playerX() {
        return state.playerX;
      }

      function shipBounds() {
        const radius = GAME.playerRadius * state.scale;
        return {
          minX: GAME.shipMinX * state.scale,
          maxX: GAME.shipMaxX * state.scale,
          minY: playAreaTop() + radius,
          maxY: playAreaBottom() - radius
        };
      }

      function laneHeights() {
        const top = playAreaTop();
        const bottom = playAreaBottom();
        const safeBand = bottom - top;
        return {
          high: top + safeBand * 0.28,
          mid: top + safeBand * 0.5,
          low: top + safeBand * 0.72
        };
      }

      function hopTravelDistance() {
        return ((GAME.hopSpeed * GAME.hopSpeed) / (2 * GAME.gravityAccel)) * state.scale;
      }

      function bottomPlatformYRange() {
        const safeBottom = playAreaBottom();
        const maxRise = Math.max(84 * state.scale, hopTravelDistance() - 10 * state.scale);
        return {
          min: safeBottom - maxRise,
          max: safeBottom - 58 * state.scale
        };
      }

      function topPlatformYRange() {
        const safeTop = playAreaTop();
        const maxDrop = Math.max(84 * state.scale, hopTravelDistance() - 10 * state.scale);
        return {
          min: safeTop + 36 * state.scale,
          max: safeTop + maxDrop - GAME.platformThickness * state.scale
        };
      }

      function rebuildBackgroundParticles() {
        const starCount = Math.max(50, Math.round((state.width * state.height) / 18000));
        const orbCount = Math.max(7, Math.round((state.width * state.height) / 115000));
        state.stars = [];
        state.decorOrbs = [];
        for (let i = 0; i < starCount; i += 1) {
          state.stars.push({
            x: Math.random() * state.width,
            y: Math.random() * state.height,
            size: rand(0.6, 2.1),
            alpha: rand(0.35, 1),
            drift: rand(0.2, 1.1)
          });
        }
        for (let i = 0; i < orbCount; i += 1) {
          state.decorOrbs.push({
            x: Math.random() * state.width,
            y: Math.random() * state.height,
            radius: rand(80, 220) * state.scale,
            speed: rand(8, 26),
            phase: rand(0, Math.PI * 2)
          });
        }
      }

      function resetPlayerPosition() {
        state.playerX = GAME.playerX * state.scale;
        state.gravitySign = 1;
        state.canFlip = true;
        state.velocityY = 0;
        state.playerY = floorY();
        state.grounded = true;
        state.groundType = "bottom";
        state.groundRef = null;
        state.shipMode = false;
        state.arrowMode = false;
        state.deathFallActive = false;
        state.trail = [];
        state.antiCampAnchorX = state.playerX;
        state.antiCampAnchorY = state.playerY;
        state.antiCampTimer = 0;
        state.ballFlipStreak = 0;
        state.arrowMiddleTrapCooldown = 0;
        state.invulnerableTimer = 0;
      }

      function resetExplosion() {
        state.explosion.active = false;
        state.explosion.timer = 0;
        state.explosion.particles = [];
      }

      function startGame() {
        state.obstacles = [];
        state.projectiles = [];
        state.score = 0;
        state.timeAlive = 0;
        state.modeTimer = 0;
        state.mode = "white";
        state.previousMode = "white";
        state.modeTransition = 1;
        state.modeFlash = 0;
        state.deathCause = "";
        state.deathFallActive = false;
        state.middleModeTimer = 0;
        state.ballFlipStreak = 0;
        prepareRunPowerups();
        state.runDiamondsEarned = 0;
        state.nextDiamondScore = diamondRewardForDifficulty().scoreStep;
        state.invulnerableTimer = 0;
        state.menuButtons = [];
        state.shopButtons = [];
        state.lobbyButtons = [];
        state.heldKeys.Space = false;
        state.heldKeys.KeyX = false;
        state.heldKeys.KeyT = false;
        state.heldKeys.KeyY = false;
        state.heldKeys.KeyA = false;
        state.heldKeys.ArrowUp = false;
        state.heldKeys.ArrowDown = false;
        state.heldKeys.ArrowLeft = false;
        state.heldKeys.ArrowRight = false;
        state.keyPressedAt.Space = -Infinity;
        state.keyPressedAt.KeyX = -Infinity;
        state.keyPressedAt.KeyT = -Infinity;
        state.keyPressedAt.KeyY = -Infinity;
        resetExplosion();
        state.spawnX = state.width + GAME.entryPadding * state.scale;
        state.state = "playing";
        state.patternIndex = Math.floor(Math.random() * patterns.length);
        state.passedObstacleCounter = 0;
        resetPlayerPosition();
        state.antiCampAnchorX = state.playerX;
        state.antiCampAnchorY = state.playerY;
        state.antiCampTimer = 0;
        state.arrowMiddleTrapCooldown = 0;
        seedInitialObstacles();
        soundtrackMedia.currentTime = 0;
        soundtrackMedia.play().catch(() => {});
      }

      function restartGame() {
        startGame();
      }

      function openMainMenu(returnState = "start") {
        state.menuReturnState = returnState;
        state.menuButtons = [];
        state.shopButtons = [];
        state.lobbyButtons = [];
        state.state = "menu";
      }

      function closeMainMenu() {
        state.menuButtons = [];
        state.shopButtons = [];
        state.lobbyButtons = [];
        state.state = state.menuReturnState === "playing" ? "playing" : "start";
      }

      function applyDifficultySelection(difficultyId) {
        if (!DIFFICULTY_ALLOWED_KINDS[difficultyId]) {
          return;
        }
        state.selectedDifficulty = difficultyId;
        state.menuButtons = [];
        resetExplosion();
        resetPlayerPosition();
        state.obstacles = [];
        state.projectiles = [];
        state.score = 0;
        state.timeAlive = 0;
        state.modeTimer = 0;
        state.runDiamondsEarned = 0;
        state.nextDiamondScore = diamondRewardForDifficulty().scoreStep;
        state.invulnerableTimer = 0;
        state.shopButtons = [];
        state.lobbyButtons = [];
        setMenuNotice("Difficulty set to " + selectedDifficultyLabel() + ". Press W to begin.");
        state.state = "start";
      }

      function seedInitialObstacles() {
        while (state.spawnX < state.width + state.width * 1.4) {
          spawnPattern();
        }
      }

      function nextSpawnGap(pattern) {
        const difficulty = difficultyLevel();
        const minGap = GAME.minimumSpawnGap * lerp(1, GAME.minimumGapScaleAtMaxDifficulty, difficulty) * state.scale;
        const maxGap = GAME.maximumSpawnGap * lerp(1, GAME.maximumGapScaleAtMaxDifficulty, difficulty) * state.scale;
        const baseGap = pattern.gap * lerp(1, GAME.baseGapScaleAtMaxDifficulty, difficulty);
        return clamp((baseGap + rand(-34, 26)) * state.scale, minGap, maxGap);
      }

      function createPlatform(x, y, width, attachment, deadly = false) {
        const thickness = GAME.platformThickness * state.scale;
        return {
          type: "platform",
          x,
          y,
          width,
          height: thickness,
          attachment,
          deadly,
          scored: false
        };
      }

      function createShooter(platform, offsetRatio = 0.64) {
        const size = GAME.shooterSize * state.scale;
        const mountX = platform.x + clamp(platform.width * offsetRatio, size * 0.8, platform.width - size * 0.8);
        const bodyY = platform.attachment === "bottom"
          ? platform.y - size * 0.82
          : platform.y + platform.height - size * 0.18;
        return {
          type: "shooter",
          x: mountX - size * 0.5,
          y: bodyY - size * 0.5,
          width: size,
          height: size,
          attachment: platform.attachment,
          cooldown: rand(GAME.shooterInitialDelayMin, GAME.shooterInitialDelayMax),
          fireInterval: rand(GAME.shooterFireIntervalMin, GAME.shooterFireIntervalMax),
          scored: false
        };
      }

      function createProjectile(x, y, options = {}) {
        return {
          x,
          y,
          radius: GAME.projectileRadius * state.scale,
          vx: options.vx ?? -GAME.projectileSpeed * state.scale,
          vy: options.vy ?? 0,
          life: options.life ?? 6,
          cause: options.cause ?? "red projectile",
          colorInner: options.colorInner ?? "#ffd6d9",
          colorOuter: options.colorOuter ?? "#ff5368",
          glow: options.glow ?? "rgba(255, 82, 102, 0.42)"
        };
      }

      function createGate(x, attachment, width, height) {
        const safeTop = playAreaTop();
        const safeBottom = playAreaBottom();
        return {
          type: "gate",
          x,
          y: attachment === "bottom" ? safeBottom - height : safeTop,
          width,
          height,
          attachment,
          scored: false
        };
      }

      function createLavaPit(x, attachment) {
        const gateWidth = rand(GAME.gateWidthMin, GAME.gateWidthMax) * state.scale;
        const gateHeight = rand(GAME.gateHeightMin, GAME.gateHeightMax) * state.scale;
        const spacing = GAME.lavaPitGateSpacing * state.scale;
        const totalWidth = GAME.lavaPitGateCount * gateWidth + (GAME.lavaPitGateCount - 1) * spacing;
        const safeTop = playAreaTop();
        const safeBottom = playAreaBottom();
        return {
          type: "lavaPit",
          x,
          y: attachment === "bottom" ? safeBottom - gateHeight : safeTop,
          width: totalWidth,
          height: gateHeight,
          gateWidth,
          gateHeight,
          gateSpacing: spacing,
          gateCount: GAME.lavaPitGateCount,
          attachment,
          speedMultiplier: GAME.lavaPitSpeedMultiplier,
          scored: false
        };
      }

      function createLavaPitChain(x, attachment) {
        const count = Math.floor(rand(GAME.lavaPitChainMin, GAME.lavaPitChainMax + 1));
        const pieces = [];
        let cursorX = x;
        for (let i = 0; i < count; i += 1) {
          const pit = createLavaPit(cursorX, attachment);
          pieces.push(pit);
          cursorX += pit.width;
          if (i < count - 1) {
            cursorX += rand(GAME.lavaPitChainGapMin, GAME.lavaPitChainGapMax) * state.scale;
          }
        }
        return {
          pieces,
          width: cursorX - x
        };
      }

      function createTrackerShooter(x, centerY) {
        const size = GAME.antiCampGateWidth * state.scale;
        const y = clamp(centerY - size * 0.5, playAreaTop(), playAreaBottom() - size);
        return {
          type: "trackerShooter",
          x,
          y,
          width: size,
          height: size,
          cooldown: 0.22,
          fireInterval: 0.6,
          scored: false
        };
      }

      function createTrackerGate(x, centerY) {
        const width = GAME.antiCampGateWidth * 0.68 * state.scale;
        const height = GAME.antiCampGateHeight * 0.72 * state.scale;
        const y = clamp(centerY - height * 0.5, playAreaTop(), playAreaBottom() - height);
        return {
          type: "trackerGate",
          x,
          y,
          width,
          height,
          scored: false
        };
      }

      function createLaser(x, lane, length) {
        const emitterSize = GAME.laserEmitterSize * state.scale;
        const thickness = GAME.laserThickness * state.scale;
        const lanes = laneHeights();
        let centerY;
        if (lane === "bottom") {
          centerY = playAreaBottom() - 34 * state.scale;
        } else if (lane === "top") {
          centerY = playAreaTop() + 34 * state.scale;
        } else {
          centerY = lanes.mid;
        }
        return {
          type: "laser",
          x,
          y: centerY - emitterSize * 0.5,
          width: emitterSize + length,
          height: emitterSize,
          beamStartX: x + emitterSize * 0.45,
          beamY: centerY - thickness * 0.5,
          beamLength: length,
          beamThickness: thickness,
          lane,
          scored: false
        };
      }

      function createBlaster(x, lane, length) {
        const emitterSize = GAME.blasterEmitterSize * state.scale;
        const thickness = GAME.blasterThickness * state.scale;
        const lanes = laneHeights();
        let centerY;
        if (lane === "bottom") {
          centerY = playAreaBottom() - 38 * state.scale;
        } else if (lane === "top") {
          centerY = playAreaTop() + 38 * state.scale;
        } else {
          centerY = lanes.mid;
        }
        return {
          type: "blaster",
          x,
          y: centerY - emitterSize * 0.5,
          width: emitterSize + length,
          height: emitterSize,
          beamStartX: x + emitterSize * 0.48,
          beamY: centerY - thickness * 0.5,
          beamLength: length,
          beamThickness: thickness,
          lane,
          phaseOffset: rand(0, GAME.blasterCycleSeconds),
          scored: false
        };
      }

      function createSpikeStrip(x, width, attachment) {
        const safeTop = playAreaTop();
        const safeBottom = playAreaBottom();
        const height = GAME.spikeHeight * state.scale;
        const y = attachment === "bottom" ? safeBottom - height : safeTop;
        return {
          type: "spike",
          x,
          y,
          width,
          height,
          attachment,
          scored: false
        };
      }

            const exitBase = farthest + rand(102, 156) * state.scale;
            return {
              playerGuide: "dualLavaMiddle",

                ...topChain.pieces,

                  exitBase,

          },
          bottom_red_platform_decoy() {

            return {

          bottom_safe_with_red_top_guard() {

          top_safe_with_red_bottom_guard() {

            const guardOffset = rand(84, 132) * state.scale;
            return {
              playerGuide: "safeTopAvoidBottomRed",

          },
          bottom_spike_window() {
            const width = rand(GAME.spikeWidthMin, GAME.spikeWidthMax) * state.scale;
            return {
              playerGuide: "topOrHop",

            };
          },
          top_spike_window() {
            const width = rand(GAME.spikeWidthMin, GAME.spikeWidthMax) * state.scale;
            return {
              playerGuide: "bottomOrHop",
              pieces: [createSpikeStrip(state.spawnX, width, "top")]
            };
          },
          bottom_platform_with_top_spikes() {
            const platformWidth = rand(160, 230) * state.scale;
            const spikeWidth = rand(68, 120) * state.scale;
            const platformY = clamp(lanes.low, bottomRange.min, bottomRange.max);
            return {
              playerGuide: "bottom",
              pieces: [
                createPlatform(state.spawnX, platformY, platformWidth, "bottom"),
                createSpikeStrip(
                  state.spawnX + platformWidth * 0.28,

                )
              ]
            };
          },
          top_platform_with_bottom_spikes() {
            const platformWidth = rand(160, 230) * state.scale;
            const spikeWidth = rand(68, 120) * state.scale;
            const platformY = clamp(lanes.high, topRange.min, topRange.max);
            return {
              playerGuide: "top",
              pieces: [
                createPlatform(state.spawnX, platformY, platformWidth, "top"),
                createSpikeStrip(
                  state.spawnX + platformWidth * 0.28,
                  Math.min(spikeWidth, platformWidth * 0.42),
                  "bottom"
                )
              ]
            };
          },
          dual_platform_bridge() {
            const baseWidth = rand(150, 210) * state.scale;
            const offset = rand(120, 160) * state.scale;
            return {
              playerGuide: "choice",
              pieces: [
                createPlatform(state.spawnX, clamp(lanes.low, bottomRange.min, bottomRange.max), baseWidth, "bottom"),
                createPlatform(state.spawnX + offset, clamp(lanes.high, topRange.min, topRange.max), baseWidth * 0.92, "top")
              ]
            };
          },
          single_gap_feint() {
            const pieceWidth = rand(90, 130) * state.scale;
            const offset = rand(150, 185) * state.scale;
            return {
              playerGuide: "react",
              pieces: [
                createSpikeStrip(state.spawnX, pieceWidth, "bottom"),
                createSpikeStrip(state.spawnX + offset, pieceWidth * 0.95, "top")
              ]
            };
          }
        };
        return configs[kind]();
      }

      function validatePattern(pieces) {
        const anchorX = playerX() + GAME.safeGapFromAnchor * state.scale;
        for (const piece of pieces) {
          if (piece.x < anchorX) {
            piece.x = anchorX;
          }
        }

        const platforms = pieces.filter((piece) => piece.type === "platform");
        const bottomPlatforms = platforms.filter((piece) => piece.attachment === "bottom");
        const topPlatforms = platforms.filter((piece) => piece.attachment === "top");
        const bottomSpikes = pieces.filter((piece) => piece.type === "spike" && piece.attachment === "bottom");
        const topSpikes = pieces.filter((piece) => piece.type === "spike" && piece.attachment === "top");

        for (const spike of bottomSpikes) {
          if (bottomPlatforms.some((platform) => intervalsOverlap(spike.x, spike.x + spike.width, platform.x - 16 * state.scale, platform.x + platform.width + 16 * state.scale))) {
            spike.x = Math.max(spike.x, bottomPlatforms[0].x + bottomPlatforms[0].width + 28 * state.scale);
          }
        }

        for (const spike of topSpikes) {
          if (topPlatforms.some((platform) => intervalsOverlap(spike.x, spike.x + spike.width, platform.x - 16 * state.scale, platform.x + platform.width + 16 * state.scale))) {
            spike.x = Math.max(spike.x, topPlatforms[0].x + topPlatforms[0].width + 28 * state.scale);
          }
        }

        const safeWindowStart = playerX() + 100 * state.scale;
        const safeWindowEnd = playerX() + 250 * state.scale;
        if (pieces.some((piece) => (piece.type === "spike" || piece.type === "shooter" || piece.type === "gate" || piece.type === "lavaPit" || piece.type === "laser" || piece.type === "blaster") && intervalsOverlap(piece.x, piece.x + piece.width, safeWindowStart, safeWindowEnd))) {
          const shift = safeWindowEnd - safeWindowStart + 60 * state.scale;
          for (const piece of pieces) {
            piece.x += shift;
          }
        }

        return pieces;
      }

      function choosePattern() {
        const difficulty = difficultyLevel();
        const eligibleIndices = difficultyEligibleIndices();
        const safeEligible = eligibleIndices.filter((index) => SAFE_PATTERN_KINDS.has(patterns[index].kind));
        const hardEligible = eligibleIndices.filter((index) => !SAFE_PATTERN_KINDS.has(patterns[index].kind));
        const extremeEligible = eligibleIndices.filter((index) => EXTREME_PATTERN_KINDS.has(patterns[index].kind));
        let index = eligibleIndices[state.patternIndex % eligibleIndices.length];
        state.patternIndex += 1;
        if (Math.random() < 0.6) {
          state.patternIndex += Math.floor(Math.random() * eligibleIndices.length);
        }

        if (difficulty < 0.2 && Math.random() < 0.32) {
          index = eligibleIndices[Math.floor(Math.random() * Math.max(1, Math.ceil(eligibleIndices.length * 0.5)))];
        }

        let pattern = patterns[index];

        if (difficulty > 0.18 && SAFE_PATTERN_KINDS.has(pattern.kind) && hardEligible.length > 0) {
          const rerollChance = lerp(0.18, 0.72, difficulty);
          if (Math.random() < rerollChance) {
            pattern = patterns[hardEligible[Math.floor(Math.random() * hardEligible.length)]];
          }
        }

        if (difficulty > 0.55 && extremeEligible.length > 0 && Math.random() < lerp(0.08, 0.36, difficulty)) {
          pattern = patterns[extremeEligible[Math.floor(Math.random() * extremeEligible.length)]];
        }

        return pattern;
      }

      function spawnPattern() {
        const pattern = choosePattern();
        const config = patternConfig(pattern.kind);
        const pieces = validatePattern(config.pieces);
        for (const piece of pieces) {
          state.obstacles.push(piece);
        }
        const farthest = Math.max(...pieces.map((piece) => piece.x + piece.width));
        state.spawnX = farthest + nextSpawnGap(pattern);
      }

      function intervalsOverlap(a1, a2, b1, b2) {
        return a1 < b2 && a2 > b1;
      }

      function distanceToSegmentSquared(px, py, ax, ay, bx, by) {
        const dx = bx - ax;
        const dy = by - ay;
        const lengthSquared = dx * dx + dy * dy;
        if (lengthSquared === 0) {
          const pointDx = px - ax;
          const pointDy = py - ay;
          return pointDx * pointDx + pointDy * pointDy;
        }
        const t = clamp(((px - ax) * dx + (py - ay) * dy) / lengthSquared, 0, 1);
        const closestX = ax + dx * t;
        const closestY = ay + dy * t;
        const distX = px - closestX;
        const distY = py - closestY;
        return distX * distX + distY * distY;
      }

      function triangleAreaSign(px, py, ax, ay, bx, by) {
        return (px - bx) * (ay - by) - (ax - bx) * (py - by);
      }

      function pointInTriangle(px, py, ax, ay, bx, by, cx, cy) {
        const d1 = triangleAreaSign(px, py, ax, ay, bx, by);
        const d2 = triangleAreaSign(px, py, bx, by, cx, cy);
        const d3 = triangleAreaSign(px, py, cx, cy, ax, ay);
        const hasNegative = d1 < 0 || d2 < 0 || d3 < 0;
        const hasPositive = d1 > 0 || d2 > 0 || d3 > 0;
        return !(hasNegative && hasPositive);
      }

      function circleIntersectsTriangle(cx, cy, radius, ax, ay, bx, by, tx, ty) {
        if (pointInTriangle(cx, cy, ax, ay, bx, by, tx, ty)) {
          return true;
        }
        const radiusSquared = radius * radius;
        return (
          distanceToSegmentSquared(cx, cy, ax, ay, bx, by) <= radiusSquared ||
          distanceToSegmentSquared(cx, cy, bx, by, tx, ty) <= radiusSquared ||
          distanceToSegmentSquared(cx, cy, tx, ty, ax, ay) <= radiusSquared
        );
      }

      function handleFlip() {
        if (state.state === "start" || state.state === "menu") {
          return;
        }
        if (state.state === "gameover") {
          return;
        }
        if (state.middleModeTimer > 0 || state.shipMode || state.arrowMode) {
          return;
        }
        if (!state.canFlip) {
          return;
        }
        state.gravitySign *= -1;
        state.canFlip = false;
        state.grounded = false;
        state.groundType = null;
        state.groundRef = null;
        state.velocityY = 0;
        state.ballFlipStreak += 1;
        if (trackerSystemsEnabled() && state.ballFlipStreak >= 2) {
          spawnBallFlipTrackerGate();
          state.ballFlipStreak = 0;
        }
      }

      function handleHop() {
        if (state.state === "start" || state.state === "menu") {
          return;
        }
        if (state.state !== "playing") {
          return;
        }
        if (state.middleModeTimer > 0 || state.shipMode || state.arrowMode) {
          return;
        }
        if (!state.grounded) {
          return;
        }
        state.velocityY = -state.gravitySign * GAME.hopSpeed * state.scale;
        state.grounded = false;
        state.ballFlipStreak = 0;
        if (state.groundType === "platform") {
          state.groundRef = null;
        }
      }

      function handleRestart() {
        restartGame();
      }

      function activateMiddleMode() {
        if (state.state === "start") {
          startGame();
        }
        if (state.state !== "playing") {
          return;
        }
        if (state.shipMode || state.arrowMode) {
          return;
        }
        state.middleModeTimer = GAME.middleModeDuration;
        state.velocityY = 0;
        state.grounded = false;
        state.groundType = "middle";
        state.groundRef = null;
        state.canFlip = false;
      }

      function cancelMiddleMode() {
        if (state.middleModeTimer <= 0 || state.state !== "playing") {
          return;
        }
        state.middleModeTimer = 0;
        state.grounded = false;
        state.groundType = null;
        state.groundRef = null;
        state.velocityY = 0;
        state.canFlip = false;
      }

      function activateShipMode() {
        if (state.state === "start") {
          startGame();
        }
        if (state.state !== "playing") {
          return;
        }
        state.middleModeTimer = 0;
        state.arrowMode = false;
        state.shipMode = true;
        state.velocityY = 0;
        state.grounded = false;
        state.groundType = "ship";
        state.groundRef = null;
        state.canFlip = false;
        const bounds = shipBounds();
        state.playerX = clamp(state.playerX, bounds.minX, bounds.maxX);
        state.playerY = clamp(state.playerY, bounds.minY, bounds.maxY);
      }

      function cancelShipMode() {
        if (!state.shipMode || state.state !== "playing") {
          return;
        }
        state.shipMode = false;
        state.grounded = false;
        state.groundType = null;
        state.groundRef = null;
        state.canFlip = false;
        state.velocityY = 0;
        state.playerX = GAME.playerX * state.scale;
      }

      function activateArrowMode() {
        if (state.state === "start") {
          startGame();
        }
        if (state.state !== "playing") {
          return;
        }
        state.middleModeTimer = 0;
        state.shipMode = false;
        state.arrowMode = true;
        state.velocityY = 0;
        state.grounded = false;
        state.groundType = "arrow";
        state.groundRef = null;
        state.canFlip = false;
        state.playerX = GAME.playerX * state.scale;
      }

      function cancelArrowMode() {
        if (!state.arrowMode || state.state !== "playing") {
          return;
        }
        state.arrowMode = false;
        state.grounded = false;
        state.groundType = null;
        state.groundRef = null;
        state.canFlip = false;
        state.velocityY = 0;
        state.playerX = GAME.playerX * state.scale;
      }

      function shouldTriggerMiddleMode(code, nowSeconds) {
        if (code !== "Space" && code !== "KeyX") {
          return false;
        }
        const other = code === "Space" ? "KeyX" : "Space";
        return (
          state.heldKeys[other] ||
          nowSeconds - state.keyPressedAt[other] <= GAME.comboPressWindow
        );
      }

      function shouldTriggerShipMode(code, nowSeconds) {
        if (code !== "KeyT" && code !== "KeyY") {
          return false;
        }
        const other = code === "KeyT" ? "KeyY" : "KeyT";
        return (
          state.heldKeys[other] ||
          nowSeconds - state.keyPressedAt[other] <= GAME.comboPressWindow
        );
      }

      function onKeyDown(event) {
        const nowSeconds = performance.now() / 1000;
        if (event.code === "Escape") {
          event.preventDefault();
          if (state.state === "playing") {
            openMainMenu("playing");
          } else if (state.state === "menu") {
            closeMainMenu();
          } else if (state.state === "gameover") {
            openMainMenu("start");
          } else if (state.state === "start") {
            openMainMenu("start");
          }
          return;
        }

        if (state.state === "start" && event.code === "KeyW") {
          event.preventDefault();
          startGame();
          return;
        }

        if (event.code === "KeyT" || event.code === "KeyY") {
          if (event.repeat) {
            event.preventDefault();
            return;
          }
          state.heldKeys[event.code] = true;
          state.keyPressedAt[event.code] = nowSeconds;
          if (shouldTriggerShipMode(event.code, nowSeconds)) {
            event.preventDefault();
            activateShipMode();
            return;
          }
        }

        if (event.code === "Space" || event.code === "KeyX") {
          if (event.repeat) {
            event.preventDefault();
            return;
          }
          state.heldKeys[event.code] = true;
          state.keyPressedAt[event.code] = nowSeconds;
          if (shouldTriggerMiddleMode(event.code, nowSeconds)) {
            event.preventDefault();
            activateMiddleMode();
            return;
          }
        }

        if (event.code === "Space") {
          event.preventDefault();
          handleFlip();
        } else if (event.code === "KeyW") {
          event.preventDefault();
          handleHop();
        } else if (event.code === "KeyQ") {
          event.preventDefault();
          activateArrowMode();
        } else if (event.code === "KeyE") {
          event.preventDefault();
          cancelArrowMode();
        } else if (event.code === "KeyZ") {
          event.preventDefault();
          cancelMiddleMode();
        } else if (event.code === "KeyG") {
          event.preventDefault();
          cancelShipMode();
        } else if (event.code === "KeyR") {
          event.preventDefault();
          handleRestart();
        } else if (
          event.code === "ArrowUp" ||
          event.code === "ArrowDown" ||
          event.code === "ArrowLeft" ||
          event.code === "ArrowRight" ||
          event.code === "KeyA"
        ) {
          event.preventDefault();
          state.heldKeys[event.code] = true;
        }
      }

      function onKeyUp(event) {
        if (
          event.code === "Space" ||
          event.code === "KeyX" ||
          event.code === "KeyT" ||
          event.code === "KeyY" ||
          event.code === "KeyA" ||
          event.code === "ArrowUp" ||
          event.code === "ArrowDown" ||
          event.code === "ArrowLeft" ||
          event.code === "ArrowRight"
        ) {
          state.heldKeys[event.code] = false;
        }
      }

      function handleMenuPointer(x, y) {
        for (const button of state.menuButtons) {
          if (
            x >= button.x &&
            x <= button.x + button.width &&
            y >= button.y &&
            y <= button.y + button.height
          ) {
            applyDifficultySelection(button.id);
            return true;
          }
        }
        for (const button of state.shopButtons) {
          if (
            x >= button.x &&
            x <= button.x + button.width &&
            y >= button.y &&
            y <= button.y + button.height
          ) {
            buyUpgrade(button.id);
            return true;
          }
        }
        for (const button of state.lobbyButtons) {
          if (
            x >= button.x &&
            x <= button.x + button.width &&
            y >= button.y &&
            y <= button.y + button.height
          ) {
            if (button.id === "host") {
              hostLocalRoom();
            } else if (button.id === "join") {
              joinLocalRoomPreview();
            } else if (button.id === "clearGuests") {
              clearJoinedGuests();
            }
            return true;
          }
        }
        return false;
      }

      function onPointerDown(event) {
        const x = event.clientX;
        const y = event.clientY;
        if (state.state === "start" || state.state === "menu") {
          handleMenuPointer(x, y);
          return;
        }
        if (x < state.width * 0.5) {
          handleFlip();
        } else {
          handleHop();
        }
      }

      function update(dt) {
        state.lastDelta = dt;
        if (state.state === "dying") {
          updateTheme(dt, false);
          animateBackground(dt);
          updateDyingPlayer(dt);
          fadeTrail(dt);
          updateExplosion(dt);
          return;
        }
        if (state.state !== "playing") {
          updateTheme(dt, false);
          animateBackground(dt);
          fadeTrail(dt);
          updateExplosion(dt);
          return;
        }

        state.timeAlive += dt;
        if (state.invulnerableTimer > 0) {
          state.invulnerableTimer = Math.max(0, state.invulnerableTimer - dt);
        }
        state.score += GAME.scoreRate * (state.activePowerups.scoreBoost ? GAME.upgradeScoreBoostMultiplier : 1) * dt;
        const diamondReward = diamondRewardForDifficulty();
        while (state.score >= state.nextDiamondScore) {
          awardDiamonds(diamondReward.diamonds);
          state.nextDiamondScore += diamondReward.scoreStep;
        }
        state.modeTimer += dt;
        if (state.modeTimer >= GAME.modeSwapSeconds) {
          state.modeTimer -= GAME.modeSwapSeconds;
          swapMode();
        }
        updateTheme(dt, true);
        animateBackground(dt);
        updateObstacles(dt);
        updateProjectiles(dt);
        if (state.state !== "playing") {
          fadeTrail(dt);
          updateExplosion(dt);
          return;
        }
        if (state.middleModeTimer > 0) {
          state.middleModeTimer = Math.max(0, state.middleModeTimer - dt);
          if (state.middleModeTimer === 0) {
            state.canFlip = true;
          }
        }
        updatePlayer(dt);
        if (state.state === "playing") {
          updateArrowMiddlePressure(dt);
          updateAntiCamp(dt);
        }
        updateTrail(dt);
        updateExplosion(dt);
        ensureUpcomingPatterns();
      }

      function updateTheme(dt, allowFlash) {
        state.modeTransition = clamp(state.modeTransition + dt / GAME.modeTransitionTime, 0, 1);
        if (allowFlash) {
          state.modeFlash = Math.max(0, state.modeFlash - dt / GAME.overlayFlashTime);
        }
      }

      function swapMode() {
        state.previousMode = state.mode;
        state.mode = state.mode === "white" ? "black" : "white";
        state.modeTransition = 0;
        state.modeFlash = 1;
      }

      function animateBackground(dt) {
        for (const star of state.stars) {
          star.x -= star.drift * dt * 10;
          if (star.x < -4) {
            star.x = state.width + 4;
            star.y = Math.random() * state.height;
          }
        }
      }

      function updateTrail(dt) {
        state.trail.unshift({
          x: playerX(),
          y: state.playerY,
          life: 1
        });
        if (state.trail.length > GAME.trailLength) {
          state.trail.length = GAME.trailLength;
        }
        for (const point of state.trail) {
          point.life = Math.max(0, point.life - dt * 3.4);
        }
      }

      function fadeTrail(dt) {
        for (const point of state.trail) {
          point.life = Math.max(0, point.life - dt * 4.8);
        }
        state.trail = state.trail.filter((point) => point.life > 0);
      }

      function updateObstacles(dt) {
        const baseMove = GAME.forwardSpeed * (state.activePowerups.slowField ? GAME.upgradeSlowFieldMultiplier : 1) * state.scale * dt;
        for (const obstacle of state.obstacles) {
          const move = baseMove * (obstacle.speedMultiplier || 1);
          obstacle.x -= move;
          if (obstacle.type === "shooter" || obstacle.type === "trackerShooter") {
            if (obstacle.type === "trackerShooter") {
              const targetY = clamp(state.playerY - obstacle.height * 0.5, playAreaTop(), playAreaBottom() - obstacle.height);
              obstacle.y = lerp(obstacle.y, targetY, Math.min(1, dt * 3.4));
            }
            obstacle.cooldown -= dt;
            if (obstacle.cooldown <= 0 && obstacle.x > playerX() + GAME.shooterFireMinXOffset * state.scale) {
              const muzzleX = obstacle.x + obstacle.width * 0.12;
              const muzzleY = obstacle.y + obstacle.height * 0.5;
              if (obstacle.type === "trackerShooter") {
                const targetDx = playerX() - muzzleX;
                const targetDy = state.playerY - muzzleY;
                const targetLength = Math.hypot(targetDx, targetDy) || 1;
                const speed = GAME.projectileSpeed * 1.08 * state.scale;
                state.projectiles.push(createProjectile(muzzleX, muzzleY, {
                  vx: (targetDx / targetLength) * speed,
                  vy: (targetDy / targetLength) * speed,
                  life: 4.2,
                  cause: "tracker shot",
                  colorInner: "#fff2cb",
                  colorOuter: "#ffb347",
                  glow: "rgba(255, 180, 82, 0.46)"
                }));
              } else {
                state.projectiles.push(createProjectile(muzzleX, muzzleY));
              }
              obstacle.cooldown += obstacle.fireInterval;
            }
          }
          if (!obstacle.scored && obstacle.x + obstacle.width < playerX() - GAME.playerRadius * state.scale) {
            obstacle.scored = true;
            state.score += obstacle.type === "platform" ? 5 : obstacle.type === "shooter" || obstacle.type === "trackerShooter" || obstacle.type === "trackerGate" || obstacle.type === "gate" || obstacle.type === "lavaPit" || obstacle.type === "laser" || obstacle.type === "blaster" ? 8 : 7;
            state.passedObstacleCounter += 1;
          }
        }
        state.obstacles = state.obstacles.filter((obstacle) => obstacle.x + obstacle.width > -160 * state.scale);
      }

      function updateProjectiles(dt) {
        const radius = GAME.playerRadius * state.scale;
        const px = playerX();
        const moveScale = state.activePowerups.slowField ? GAME.upgradeSlowFieldMultiplier : 1;
        for (const projectile of state.projectiles) {
          projectile.x += projectile.vx * dt * moveScale;
          projectile.y += projectile.vy * dt * moveScale;
          projectile.life -= dt;
          const dx = projectile.x - px;
          const dy = projectile.y - state.playerY;
          const hitRadius = projectile.radius + radius;
          if (dx * dx + dy * dy <= hitRadius * hitRadius) {
            triggerGameOver(projectile.cause);
            return;
          }
        }
        state.projectiles = state.projectiles.filter((projectile) =>
          projectile.life > 0 &&
          projectile.x + projectile.radius > -40 * state.scale &&
          projectile.y + projectile.radius > playAreaTop() - 40 * state.scale &&
          projectile.y - projectile.radius < playAreaBottom() + 40 * state.scale
        );
      }

      function spawnAntiCampGate() {
        state.obstacles.push(
          createTrackerShooter(
            playerX() + GAME.antiCampSpawnOffset * state.scale,
            state.playerY
          )
        );
      }

      function spawnArrowMiddleTrackerGate() {
        state.obstacles.push(
          createTrackerGate(
            playerX() + GAME.antiCampSpawnOffset * state.scale,
            state.playerY
          )
        );
      }

      function spawnBallFlipTrackerGate() {
        state.obstacles.push(
          createTrackerGate(
            playerX() + GAME.antiCampSpawnOffset * state.scale,
            state.playerY
          )
        );
      }

      function updateArrowMiddlePressure(dt) {
        if (!trackerSystemsEnabled() || (!state.arrowMode && !state.shipMode)) {
          state.arrowMiddleTrapCooldown = 0;
          return;
        }
        state.arrowMiddleTrapCooldown = Math.max(0, state.arrowMiddleTrapCooldown - dt);
        const middleDistance = Math.abs(state.playerY - laneHeights().mid);
        if (middleDistance <= GAME.arrowMiddleDangerBand * state.scale && state.arrowMiddleTrapCooldown <= 0) {
          spawnArrowMiddleTrackerGate();
          state.arrowMiddleTrapCooldown = GAME.arrowMiddleShooterCooldown;
        }
      }

      function updateAntiCamp(dt) {
        if (!trackerSystemsEnabled()) {
          state.antiCampTimer = 0;
          return;
        }
        const tolerance = GAME.antiCampTolerance * state.scale;
        const dx = state.playerX - state.antiCampAnchorX;
        const dy = state.playerY - state.antiCampAnchorY;
        if (dx * dx + dy * dy > tolerance * tolerance) {
          state.antiCampAnchorX = state.playerX;
          state.antiCampAnchorY = state.playerY;
          state.antiCampTimer = 0;
          return;
        }
        state.antiCampTimer += dt;
        if (state.antiCampTimer >= GAME.antiCampSeconds) {
          spawnAntiCampGate();
          state.antiCampAnchorX = state.playerX;
          state.antiCampAnchorY = state.playerY;
          state.antiCampTimer = 0;
        }
      }

      function ensureUpcomingPatterns() {
        const furthest = state.obstacles.length
          ? state.obstacles.reduce((max, obstacle) => Math.max(max, obstacle.x + obstacle.width), 0)
          : state.width + GAME.entryPadding * state.scale;
        state.spawnX = furthest + GAME.minimumSpawnGap * state.scale;
        while (state.spawnX < state.width + state.width * 1.2) {
          spawnPattern();
        }
      }

      function updatePlayer(dt) {
        const radius = GAME.playerRadius * state.scale;
        const previousY = state.playerY;

        if (state.arrowMode) {
          state.playerX = GAME.playerX * state.scale;
          const direction = state.heldKeys.KeyA ? -1 : 1;
          state.playerY = clamp(
            state.playerY + direction * GAME.arrowSpeed * state.scale * dt,
            playAreaTop() + radius,
            playAreaBottom() - radius
          );
          state.velocityY = 0;
          state.grounded = false;
          state.groundType = "arrow";
          state.groundRef = null;

          const arrowCrash = checkArrowModeSolidCollision(radius);
          if (arrowCrash) {
            triggerGameOver(arrowCrash);
            return;
          }

          if (checkSpikeCollision(radius)) {
            triggerGameOver("spikes");
            return;
          }

          if (checkLavaPitCollision(radius)) {
            triggerGameOver("lava pit");
            return;
          }

          if (checkGateCollision(radius)) {
            triggerGameOver("red gate");
            return;
          }

          if (checkTrackerGateCollision(radius)) {
            triggerGameOver("tracker gate");
            return;
          }

          if (checkTrackerShooterCollision(radius)) {
            triggerGameOver("tracker shooter");
            return;
          }

          if (checkLaserCollision(radius)) {
            triggerGameOver("laser");
            return;
          }

          if (checkBlasterCollision(radius)) {
            triggerGameOver("blaster");
          }
          return;
        }

        if (state.shipMode) {
          const inputX = (state.heldKeys.ArrowRight ? 1 : 0) - (state.heldKeys.ArrowLeft ? 1 : 0);
          const inputY = (state.heldKeys.ArrowDown ? 1 : 0) - (state.heldKeys.ArrowUp ? 1 : 0);
          const inputLength = Math.hypot(inputX, inputY) || 1;
          const moveX = (inputX / inputLength) * GAME.shipSpeedX * state.scale * dt;
          const moveY = (inputY / inputLength) * GAME.shipSpeedY * state.scale * dt;
          const bounds = shipBounds();
          state.playerX = clamp(state.playerX + moveX, bounds.minX, bounds.maxX);
          state.playerY = clamp(state.playerY + moveY, bounds.minY, bounds.maxY);
          state.velocityY = 0;
          state.grounded = false;
          state.groundType = "ship";
          state.groundRef = null;

          if (state.playerY >= floorY() - 1 * state.scale) {
            triggerGameOver("ground");
            return;
          }

          if (checkSpikeCollision(radius)) {
            triggerGameOver("spikes");
            return;
          }

          if (checkLavaPitCollision(radius)) {
            triggerGameOver("lava pit");
            return;
          }

          if (checkGateCollision(radius)) {
            triggerGameOver("red gate");
            return;
          }

          if (checkTrackerGateCollision(radius)) {
            triggerGameOver("tracker gate");
            return;
          }

          if (checkTrackerShooterCollision(radius)) {
            triggerGameOver("tracker shooter");
            return;
          }

          if (checkLaserCollision(radius)) {
            triggerGameOver("laser");
            return;
          }

          if (checkBlasterCollision(radius)) {
            triggerGameOver("blaster");
          }
          return;
        }

        if (state.middleModeTimer > 0) {
          state.playerX = GAME.playerX * state.scale;
          state.playerY = laneHeights().mid;
          state.velocityY = 0;
          state.grounded = false;
          state.groundType = "middle";
          state.groundRef = null;

          if (checkSpikeCollision(radius)) {
            triggerGameOver("spikes");
            return;
          }

          if (checkLavaPitCollision(radius)) {
            triggerGameOver("lava pit");
            return;
          }

          if (checkGateCollision(radius)) {
            triggerGameOver("red gate");
            return;
          }

          if (checkTrackerGateCollision(radius)) {
            triggerGameOver("tracker gate");
            return;
          }

          if (checkTrackerShooterCollision(radius)) {
            triggerGameOver("tracker shooter");
            return;
          }

          if (checkLaserCollision(radius)) {
            triggerGameOver("laser");
            return;
          }

          if (checkBlasterCollision(radius)) {
            triggerGameOver("blaster");
          }
          return;
        }

        state.playerX = GAME.playerX * state.scale;
        state.velocityY += state.gravitySign * GAME.gravityAccel * state.scale * dt;
        state.velocityY = clamp(state.velocityY, -GAME.maxFallSpeed * state.scale, GAME.maxFallSpeed * state.scale);
        state.playerY += state.velocityY * dt;
        state.grounded = false;
        let landed = false;

        if (state.gravitySign > 0) {
          const floor = floorY();
          if (state.playerY >= floor) {
            state.playerY = floor;
            state.velocityY = 0;
            state.grounded = true;
            state.groundType = "bottom";
            state.groundRef = null;
            landed = true;
          }
        } else {
          const ceiling = ceilingY();
          if (state.playerY <= ceiling) {
            state.playerY = ceiling;
            state.velocityY = 0;
            state.grounded = true;
            state.groundType = "top";
            state.groundRef = null;
            landed = true;
          }
        }

        if (!landed) {
          const hitPlatform = resolvePlatformLanding(previousY, state.playerY, radius);
          if (hitPlatform) {
            landed = true;
            state.grounded = true;
            state.groundType = "platform";
            state.groundRef = hitPlatform;
          }
        }

        if (landed) {
          state.canFlip = true;
        }

        if (checkSpikeCollision(radius)) {
          triggerGameOver("spikes");
          return;
        }

        if (checkLavaPitCollision(radius)) {
          triggerGameOver("lava pit");
          return;
        }

        if (checkGateCollision(radius)) {
          triggerGameOver("red gate");
          return;
        }

        if (checkTrackerGateCollision(radius)) {
          triggerGameOver("tracker gate");
          return;
        }

        if (checkTrackerShooterCollision(radius)) {
          triggerGameOver("tracker shooter");
          return;
        }

        if (checkLaserCollision(radius)) {
          triggerGameOver("laser");
          return;
        }

        if (checkBlasterCollision(radius)) {
          triggerGameOver("blaster");
        }
      }

      function updateDyingPlayer(dt) {
        if (!state.deathFallActive) {
          return;
        }
        state.velocityY += GAME.deathFallAccel * state.scale * dt;
        state.velocityY = clamp(state.velocityY, 0, GAME.deathFallMaxSpeed * state.scale);
        state.playerY += state.velocityY * dt;
        if (state.playerY >= floorY()) {
          state.playerY = floorY();
          state.velocityY = 0;
          state.deathFallActive = false;
          finishGameOver(state.deathCause || "hazard");
        }
      }

      function checkArrowModeSolidCollision(radius) {
        const px = playerX();
        if (state.playerY <= ceilingY() + 1 * state.scale) {
          return "ceiling";
        }
        if (state.playerY >= floorY() - 1 * state.scale) {
          return "ground";
        }

        for (const obstacle of state.obstacles) {
          if (
            obstacle.type !== "platform" &&
            obstacle.type !== "shooter" &&
            obstacle.type !== "trackerShooter"
          ) {
            continue;
          }
          const closestX = clamp(px, obstacle.x, obstacle.x + obstacle.width);
          const closestY = clamp(state.playerY, obstacle.y, obstacle.y + obstacle.height);
          const dx = px - closestX;
          const dy = state.playerY - closestY;
          if (dx * dx + dy * dy <= radius * radius) {
            if (obstacle.type === "platform") {
              return obstacle.deadly ? "red platform" : "platform";
            }
            return obstacle.type === "trackerShooter" ? "tracker shooter" : "shooter";
          }
        }

        return "";
      }

      function resolvePlatformLanding(previousY, currentY, radius) {
        let chosen = null;
        let chosenDistance = Infinity;
        const px = playerX();
        const horizontalForgiveness = GAME.platformLandingHorizontalForgiveness * state.scale;
        const verticalForgiveness = GAME.platformLandingVerticalForgiveness * state.scale;
        const snapDistance = GAME.platformLandingSnapDistance * state.scale;
        for (const obstacle of state.obstacles) {
          if (obstacle.type !== "platform") {
            continue;
          }
          const centerWithinLandingFace =
            px >= obstacle.x - horizontalForgiveness &&
            px <= obstacle.x + obstacle.width + horizontalForgiveness;
          if (
            !centerWithinLandingFace ||
            px + radius < obstacle.x - horizontalForgiveness ||
            px - radius > obstacle.x + obstacle.width + horizontalForgiveness
          ) {
            continue;
          }

          if (obstacle.attachment === "bottom" && state.gravitySign > 0) {
            const landingFace = obstacle.y - radius;
            const approaching = currentY >= previousY;
            const aboveFaceBefore = previousY <= landingFace + verticalForgiveness;
            const crossedFace =
              aboveFaceBefore &&
              currentY >= landingFace - verticalForgiveness;
            const snapToFace =
              approaching &&
              aboveFaceBefore &&
              Math.abs(currentY - landingFace) <= snapDistance;
            if (
              crossedFace ||
              snapToFace
            ) {
              const distance = Math.abs(currentY - landingFace);
              if (distance < chosenDistance) {
                chosenDistance = distance;
                chosen = { obstacle, y: landingFace };
              }
            }
          } else if (obstacle.attachment === "top" && state.gravitySign < 0) {
            const landingFace = obstacle.y + obstacle.height + radius;
            const approaching = currentY <= previousY;
            const belowFaceBefore = previousY >= landingFace - verticalForgiveness;
            const crossedFace =
              belowFaceBefore &&
              currentY <= landingFace + verticalForgiveness;
            const snapToFace =
              approaching &&
              belowFaceBefore &&
              Math.abs(currentY - landingFace) <= snapDistance;
            if (
              crossedFace ||
              snapToFace
            ) {
              const distance = Math.abs(currentY - landingFace);
              if (distance < chosenDistance) {
                chosenDistance = distance;
                chosen = { obstacle, y: landingFace };
              }
            }
          }
        }

        if (chosen) {
          if (chosen.obstacle.deadly) {
            triggerGameOver("red platform");
            return null;
          }
          state.playerY = chosen.y;
          state.velocityY = 0;
          return chosen.obstacle;
        }

        return null;
      }

      function checkSpikeCollision(radius) {
        const px = playerX();
        const ballLeft = px - radius;
        const ballRight = px + radius;
        const ballTop = state.playerY - radius;
        const ballBottom = state.playerY + radius;

        for (const obstacle of state.obstacles) {
          if (obstacle.type !== "spike") {
            continue;
          }
          if (!intervalsOverlap(ballLeft, ballRight, obstacle.x, obstacle.x + obstacle.width)) {
            continue;
          }
          if (!intervalsOverlap(ballTop, ballBottom, obstacle.y, obstacle.y + obstacle.height)) {
            continue;
          }

          const triangleCount = Math.max(2, Math.round(obstacle.width / (18 * state.scale)));
          const triWidth = obstacle.width / triangleCount;
          for (let i = 0; i < triangleCount; i += 1) {
            const left = obstacle.x + triWidth * i;
            let ax;
            let ay;
            let bx;
            let by;
            let tx;
            let ty;

            if (obstacle.attachment === "bottom") {
              ax = left;
              ay = obstacle.y + obstacle.height;
              bx = left + triWidth;
              by = obstacle.y + obstacle.height;
              tx = left + triWidth * 0.5;
              ty = obstacle.y;
            } else {
              ax = left;
              ay = obstacle.y;
              bx = left + triWidth;
              by = obstacle.y;
              tx = left + triWidth * 0.5;
              ty = obstacle.y + obstacle.height;
            }

            if (circleIntersectsTriangle(px, state.playerY, radius, ax, ay, bx, by, tx, ty)) {
              return true;
            }
          }
        }
        return false;
      }

      function checkGateCollision(radius) {
        const px = playerX();
        for (const obstacle of state.obstacles) {
          if (obstacle.type !== "gate") {
            continue;
          }
          const closestX = clamp(px, obstacle.x, obstacle.x + obstacle.width);
          const closestY = clamp(state.playerY, obstacle.y, obstacle.y + obstacle.height);
          const dx = px - closestX;
          const dy = state.playerY - closestY;
          if (dx * dx + dy * dy <= radius * radius) {
            return true;
          }
        }
        return false;
      }

      function checkTrackerGateCollision(radius) {
        const px = playerX();
        for (const obstacle of state.obstacles) {
          if (obstacle.type !== "trackerGate") {
            continue;
          }
          const closestX = clamp(px, obstacle.x, obstacle.x + obstacle.width);
          const closestY = clamp(state.playerY, obstacle.y, obstacle.y + obstacle.height);
          const dx = px - closestX;
          const dy = state.playerY - closestY;
          if (dx * dx + dy * dy <= radius * radius) {
            return true;
          }
        }
        return false;
      }

      function checkLavaPitCollision(radius) {
        const px = playerX();
        for (const obstacle of state.obstacles) {
          if (obstacle.type !== "lavaPit") {
            continue;
          }
          const closestX = clamp(px, obstacle.x, obstacle.x + obstacle.width);
          const closestY = clamp(state.playerY, obstacle.y, obstacle.y + obstacle.height);
          const dx = px - closestX;
          const dy = state.playerY - closestY;
          if (dx * dx + dy * dy <= radius * radius) {
            return true;
          }
        }
        return false;
      }

      function checkTrackerShooterCollision(radius) {
        const px = playerX();
        for (const obstacle of state.obstacles) {
          if (obstacle.type !== "trackerShooter") {
            continue;
          }
          const closestX = clamp(px, obstacle.x, obstacle.x + obstacle.width);
          const closestY = clamp(state.playerY, obstacle.y, obstacle.y + obstacle.height);
          const dx = px - closestX;
          const dy = state.playerY - closestY;
          if (dx * dx + dy * dy <= radius * radius) {
            return true;
          }
        }
        return false;
      }

      function checkLaserCollision(radius) {
        const px = playerX();
        for (const obstacle of state.obstacles) {
          if (obstacle.type !== "laser") {
            continue;
          }
          const emitterClosestX = clamp(px, obstacle.x, obstacle.x + GAME.laserEmitterSize * state.scale);
          const emitterClosestY = clamp(state.playerY, obstacle.y, obstacle.y + GAME.laserEmitterSize * state.scale);
          const emitterDx = px - emitterClosestX;
          const emitterDy = state.playerY - emitterClosestY;
          if (emitterDx * emitterDx + emitterDy * emitterDy <= radius * radius) {
            return true;
          }

          const beamLeft = obstacle.beamStartX;
          const beamRight = obstacle.beamStartX + obstacle.beamLength;
          const beamPadding = 6 * state.scale;
          const beamTop = obstacle.beamY - beamPadding;
          const beamBottom = obstacle.beamY + obstacle.beamThickness + beamPadding;
          const closestX = clamp(px, beamLeft, beamRight);
          const closestY = clamp(state.playerY, beamTop, beamBottom);
          const dx = px - closestX;
          const dy = state.playerY - closestY;
          if (dx * dx + dy * dy <= radius * radius) {
            return true;
          }
        }
        return false;
      }

      function isBlasterActive(obstacle) {
        const cycleTime = (state.timeAlive + obstacle.phaseOffset) % GAME.blasterCycleSeconds;
        return cycleTime < GAME.blasterActiveSeconds;
      }

      function checkBlasterCollision(radius) {
        const px = playerX();
        for (const obstacle of state.obstacles) {
          if (obstacle.type !== "blaster" || !isBlasterActive(obstacle)) {
            continue;
          }
          const beamLeft = obstacle.beamStartX;
          const beamRight = obstacle.beamStartX + obstacle.beamLength;
          const beamPadding = 8 * state.scale;
          const beamTop = obstacle.beamY - beamPadding;
          const beamBottom = obstacle.beamY + obstacle.beamThickness + beamPadding;
          const closestX = clamp(px, beamLeft, beamRight);
          const closestY = clamp(state.playerY, beamTop, beamBottom);
          const dx = px - closestX;
          const dy = state.playerY - closestY;
          if (dx * dx + dy * dy <= radius * radius) {
            return true;
          }
        }
        return false;
      }

      function updateExplosion(dt) {
        if (!state.explosion.active) {
          return;
        }
        state.explosion.timer += dt;
        for (const particle of state.explosion.particles) {
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
          particle.life = Math.max(0, particle.life - dt / state.explosion.duration);
        }
        state.explosion.particles = state.explosion.particles.filter((particle) => particle.life > 0);
        if (state.explosion.timer >= state.explosion.duration) {
          state.explosion.active = false;
        }
      }

      function triggerExplosion() {
        const px = playerX();
        const py = state.playerY;
        state.explosion.active = true;
        state.explosion.x = px;
        state.explosion.y = py;
        state.explosion.timer = 0;
        state.explosion.particles = [];
        const sparkCount = 10;
        for (let i = 0; i < sparkCount; i += 1) {
          const angle = rand(-Math.PI * 0.95, Math.PI * 0.15);
          const speed = rand(120, 250) * state.scale;
          state.explosion.particles.push({
            x: px,
            y: py,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            radius: rand(2.5, 5.5) * state.scale,
            life: rand(0.55, 1),
            color: i % 2 === 0 ? "#ff8b5c" : "#ffe2b8",
            type: "spark"
          });
        }
        const smokeCount = 14;
        for (let i = 0; i < smokeCount; i += 1) {
          state.explosion.particles.push({
            x: px + rand(-10, 10) * state.scale,
            y: py + rand(-6, 6) * state.scale,
            vx: rand(-55, 55) * state.scale,
            vy: rand(-210, -80) * state.scale,
            radius: rand(7, 16) * state.scale,
            life: rand(0.5, 1),
            color: i % 2 === 0 ? "rgba(80, 82, 88, 0.88)" : "rgba(42, 44, 50, 0.84)",
            type: "smoke"
          });
        }
      }

      function getAudioContext() {
        if (!audioContext) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) {
            return null;
          }
          audioContext = new Ctx();
        }
        if (audioContext.state === "suspended") {
          audioContext.resume();
        }
        return audioContext;
      }

      function playExplosionSound() {
        const ac = getAudioContext();
        if (!ac) {
          return;
        }
        const now = ac.currentTime;

        const master = ac.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(0.95, now + 0.012);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 0.72);
        master.connect(ac.destination);

        const osc = ac.createOscillator();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(190, now);
        osc.frequency.exponentialRampToValueAtTime(38, now + 0.72);
        const oscFilter = ac.createBiquadFilter();
        oscFilter.type = "lowpass";
        oscFilter.frequency.setValueAtTime(1700, now);
        oscFilter.frequency.exponentialRampToValueAtTime(120, now + 0.72);
        osc.connect(oscFilter);
        oscFilter.connect(master);
        osc.start(now);
        osc.stop(now + 0.72);

        const buffer = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.72), ac.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i += 1) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
        }

        const noise = ac.createBufferSource();
        noise.buffer = buffer;
        const noiseFilter = ac.createBiquadFilter();
        noiseFilter.type = "bandpass";
        noiseFilter.frequency.setValueAtTime(420, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(95, now + 0.72);
        const noiseGain = ac.createGain();
        noiseGain.gain.setValueAtTime(0.001, now);
        noiseGain.gain.exponentialRampToValueAtTime(1.1, now + 0.015);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.66);
        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(ac.destination);
        noise.start(now);
        noise.stop(now + 0.72);
      }

      function finishGameOver(cause = "hazard") {
        state.trail = [];
        triggerExplosion();
        playExplosionSound();
        state.state = "gameover";
        state.deathCause = cause;
        state.bestScore = Math.max(state.bestScore, Math.floor(state.score));
        localStorage.setItem(STORAGE_KEY, String(state.bestScore));
      }

      function triggerGameOver(cause = "hazard") {
        if (state.state === "gameover" || state.state === "dying") {
          return;
        }
        if (state.invulnerableTimer > 0) {
          return;
        }
        if (state.state === "playing" && state.runShieldReady) {
          state.runShieldReady = false;
          state.invulnerableTimer = GAME.shieldInvulnerabilitySeconds;
          state.modeFlash = 1;
          setMenuNotice("Shield blocked " + cause + ".");
          return;
        }
        soundtrackMedia.pause();
        soundtrackMedia.currentTime = 0;
        state.deathCause = cause;
        const airborneDeath =
          !state.grounded &&
          !state.explosion.active &&
          state.playerY < floorY() - 2 * state.scale;
        if (airborneDeath) {
          state.state = "dying";
          state.deathFallActive = true;
          state.middleModeTimer = 0;
          state.shipMode = false;
          state.arrowMode = false;
          state.groundType = null;
          state.groundRef = null;
          state.canFlip = false;
          state.velocityY = Math.max(GAME.deathFallInitialSpeed * state.scale, Math.abs(state.velocityY) * 0.35);
          return;
        }
        finishGameOver(cause);
      }

      function draw() {
        const palette = currentPalette();
        drawBackground(palette);
        drawPlayfieldGlow(palette);
        drawObstacles(palette);
        drawProjectiles();
        drawTrail(palette);
        if (!state.explosion.active) {
          drawPlayer(palette);
          drawJoinedGuests();
        }
        drawHud(palette);
        drawStateOverlay(palette);
        drawExplosion();
      }

      function drawBackground(palette) {
        const gradient = ctx.createLinearGradient(0, 0, 0, state.height);
        gradient.addColorStop(0, palette.bgTop);
        gradient.addColorStop(1, palette.bgBottom);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, state.width, state.height);

        for (const orb of state.decorOrbs) {
          const drift = Math.sin(state.timeAlive * 0.25 + orb.phase) * 24 * state.scale;
          const x = orb.x - (state.timeAlive * orb.speed) % (state.width + orb.radius * 2);
          const y = orb.y + drift;
          const radial = ctx.createRadialGradient(x, y, 0, x, y, orb.radius);
          radial.addColorStop(0, palette.orb);
          radial.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = radial;
          ctx.fillRect(x - orb.radius, y - orb.radius, orb.radius * 2, orb.radius * 2);
        }

        for (const star of state.stars) {
          const twinkle = 0.5 + 0.5 * Math.sin(state.timeAlive * 2.2 + star.x * 0.01 + star.y * 0.02);
          ctx.fillStyle = palette.star.replace("0.95", String(clamp(star.alpha * twinkle, 0.1, 1))).replace("0.55", String(clamp(star.alpha * twinkle, 0.08, 0.75)));
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fill();
        }

        const fog = ctx.createLinearGradient(0, playAreaTop(), 0, playAreaBottom());
        fog.addColorStop(0, "rgba(255,255,255,0)");
        fog.addColorStop(0.5, palette.fog);
        fog.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = fog;
        ctx.fillRect(0, playAreaTop(), state.width, playAreaBottom() - playAreaTop());

        if (state.modeFlash > 0) {
          ctx.fillStyle = "rgba(255,255,255," + (state.modeFlash * 0.16) + ")";
          ctx.fillRect(0, 0, state.width, state.height);
        }
      }

      function drawPlayfieldGlow(palette) {
        const lineGlow = 18 * state.scale;
        ctx.save();
        ctx.shadowBlur = lineGlow;
        ctx.shadowColor = palette.platformGlow;
        ctx.strokeStyle = palette.uiSubtle;
        ctx.lineWidth = 2 * state.scale;
        ctx.setLineDash([12 * state.scale, 10 * state.scale]);
        ctx.globalAlpha = 0.35;
        ctx.beginPath();
        ctx.moveTo(0, playAreaTop());
        ctx.lineTo(state.width, playAreaTop());
        ctx.moveTo(0, playAreaBottom());
        ctx.lineTo(state.width, playAreaBottom());
        ctx.stroke();
        ctx.restore();
        ctx.setLineDash([]);
      }

      function drawObstacles(palette) {
        for (const obstacle of state.obstacles) {
          if (obstacle.type === "platform") {
            drawPlatform(obstacle, palette);
          } else if (obstacle.type === "shooter" || obstacle.type === "trackerShooter") {
            drawShooter(obstacle);
          } else if (obstacle.type === "blaster") {
            drawBlaster(obstacle);
          } else if (obstacle.type === "laser") {
            drawLaser(obstacle);
          } else if (obstacle.type === "lavaPit") {
            drawLavaPit(obstacle);
          } else if (obstacle.type === "gate" || obstacle.type === "trackerGate") {
            drawGate(obstacle);
          } else {
            drawSpikes(obstacle, palette);
          }
        }
      }

      function drawPlatform(obstacle, palette) {
        const depth = obstacle.height * 0.72;
        ctx.save();
        ctx.shadowBlur = 18 * state.scale;
        ctx.shadowColor = obstacle.deadly ? "rgba(255, 72, 72, 0.38)" : palette.platformGlow;
