        const faceGradient = ctx.createLinearGradient(obstacle.x, obstacle.y, obstacle.x, obstacle.y + obstacle.height);
        if (obstacle.deadly) {
          if (obstacle.attachment === "bottom") {
            faceGradient.addColorStop(0, "#ff8b8b");
            faceGradient.addColorStop(1, "#b8152f");
          } else {
            faceGradient.addColorStop(0, "#b8152f");
            faceGradient.addColorStop(1, "#ff8b8b");
          }
        } else {
          if (obstacle.attachment === "bottom") {
            faceGradient.addColorStop(0, palette.platformTop);
            faceGradient.addColorStop(1, palette.platformSide);
          } else {
            faceGradient.addColorStop(0, palette.platformSide);
            faceGradient.addColorStop(1, palette.platformTop);
          }
        }

        ctx.fillStyle = faceGradient;
        ctx.beginPath();
        ctx.roundRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height, 10 * state.scale);
        ctx.fill();

        ctx.globalAlpha = 0.5;
        ctx.fillStyle = obstacle.deadly
          ? "rgba(255,255,255,0.10)"
          : obstacle.attachment === "bottom" ? "rgba(255,255,255,0.14)" : "rgba(0,0,0,0.12)";
        ctx.fillRect(obstacle.x + 6 * state.scale, obstacle.y + 4 * state.scale, obstacle.width - 12 * state.scale, depth * 0.26);
        ctx.restore();

        ctx.strokeStyle = obstacle.deadly ? "rgba(255, 235, 235, 0.5)" : "rgba(255,255,255,0.18)";
        ctx.lineWidth = 2 * state.scale;
        ctx.beginPath();
        if (obstacle.attachment === "bottom") {
          ctx.moveTo(obstacle.x + 10 * state.scale, obstacle.y + 3 * state.scale);
          ctx.lineTo(obstacle.x + obstacle.width - 10 * state.scale, obstacle.y + 3 * state.scale);
        } else {
          ctx.moveTo(obstacle.x + 10 * state.scale, obstacle.y + obstacle.height - 3 * state.scale);
          ctx.lineTo(obstacle.x + obstacle.width - 10 * state.scale, obstacle.y + obstacle.height - 3 * state.scale);
        }
        ctx.stroke();

        if (obstacle.deadly) {
          ctx.save();
          ctx.strokeStyle = "rgba(255, 248, 248, 0.68)";
          ctx.lineWidth = 1.4 * state.scale;
          const step = 18 * state.scale;
          for (let x = obstacle.x + 12 * state.scale; x < obstacle.x + obstacle.width - 8 * state.scale; x += step) {
            ctx.beginPath();
            if (obstacle.attachment === "bottom") {
              ctx.moveTo(x, obstacle.y + obstacle.height - 4 * state.scale);
              ctx.lineTo(x + 7 * state.scale, obstacle.y + 4 * state.scale);
            } else {
              ctx.moveTo(x, obstacle.y + 4 * state.scale);
              ctx.lineTo(x + 7 * state.scale, obstacle.y + obstacle.height - 4 * state.scale);
            }
            ctx.stroke();
          }
          ctx.restore();
        }
      }

      function drawSpikes(obstacle, palette) {
        const triangleCount = Math.max(2, Math.round(obstacle.width / (18 * state.scale)));
        const triWidth = obstacle.width / triangleCount;
        ctx.save();
        ctx.shadowBlur = 14 * state.scale;
        ctx.shadowColor = palette.hazardGlow;
        ctx.fillStyle = palette.spike;
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.lineWidth = 1.5 * state.scale;
        ctx.beginPath();
        for (let i = 0; i < triangleCount; i += 1) {
          const x = obstacle.x + triWidth * i;
          if (obstacle.attachment === "bottom") {
            ctx.moveTo(x, obstacle.y + obstacle.height);
            ctx.lineTo(x + triWidth * 0.5, obstacle.y);
            ctx.lineTo(x + triWidth, obstacle.y + obstacle.height);
          } else {
            ctx.moveTo(x, obstacle.y);
            ctx.lineTo(x + triWidth * 0.5, obstacle.y + obstacle.height);
            ctx.lineTo(x + triWidth, obstacle.y);
          }
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawShooter(obstacle) {
        const pulse = 0.84 + 0.16 * Math.sin(state.timeAlive * 5.8 + obstacle.x * 0.02);
        const isTracker = obstacle.type === "trackerShooter";
        const trackerFlash = isTracker ? 0.5 + 0.5 * Math.sin(state.timeAlive * 12) : 0;
        ctx.save();
        ctx.shadowBlur = 18 * state.scale;
        ctx.shadowColor = isTracker
          ? "rgba(255, " + Math.round(70 + trackerFlash * 100) + ", " + Math.round(40 + trackerFlash * 36) + ", 0.5)"
          : "rgba(255, 68, 68, 0.38)";

        ctx.fillStyle = isTracker
          ? (trackerFlash > 0.5 ? "#a81c1c" : "#5d330c")
          : "#55101b";
        ctx.beginPath();
        ctx.roundRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height, 7 * state.scale);
        ctx.fill();

        ctx.fillStyle = isTracker
          ? (trackerFlash > 0.5 ? "#ff4a4a" : "#ffb347")
          : "#ef4758";
        ctx.beginPath();
        ctx.arc(
          obstacle.x + obstacle.width * 0.5,
          obstacle.y + obstacle.height * 0.5,
          obstacle.width * 0.22 * pulse,
          0,
          Math.PI * 2
        );
        ctx.fill();

        ctx.strokeStyle = isTracker
          ? (trackerFlash > 0.5 ? "#ffd9d9" : "#fff1d5")
          : "#ffd0d4";
        ctx.lineWidth = 2 * state.scale;
        ctx.beginPath();
        ctx.moveTo(obstacle.x + obstacle.width * 0.25, obstacle.y + obstacle.height * 0.5);
        ctx.lineTo(obstacle.x - obstacle.width * 0.34, obstacle.y + obstacle.height * 0.5);
        ctx.stroke();

        if (isTracker) {
          ctx.beginPath();
          ctx.moveTo(obstacle.x + obstacle.width * 0.5, obstacle.y + obstacle.height * 0.18);
          ctx.lineTo(obstacle.x + obstacle.width * 0.5, obstacle.y + obstacle.height * 0.82);
          ctx.moveTo(obstacle.x + obstacle.width * 0.18, obstacle.y + obstacle.height * 0.5);
          ctx.lineTo(obstacle.x + obstacle.width * 0.82, obstacle.y + obstacle.height * 0.5);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawBlaster(obstacle) {
        const emitterSize = GAME.blasterEmitterSize * state.scale;
        const active = isBlasterActive(obstacle);
        const pulse = active
          ? 0.88 + 0.12 * Math.sin(state.timeAlive * 10.5 + obstacle.x * 0.04)
          : 0.42 + 0.08 * Math.sin(state.timeAlive * 3.2 + obstacle.x * 0.02);

        ctx.save();
        ctx.shadowBlur = active ? 22 * state.scale : 10 * state.scale;
        ctx.shadowColor = active ? "rgba(255, 112, 78, 0.48)" : "rgba(255, 112, 78, 0.16)";

        ctx.fillStyle = active ? "#7a1b0e" : "#4d1a14";
        ctx.beginPath();
        ctx.roundRect(obstacle.x, obstacle.y, emitterSize, emitterSize, 9 * state.scale);
        ctx.fill();

        ctx.fillStyle = active ? "#ff9d6b" : "#b7684d";
        ctx.beginPath();
        ctx.arc(
          obstacle.x + emitterSize * 0.52,
          obstacle.y + emitterSize * 0.5,
          emitterSize * 0.2 * pulse,
          0,
          Math.PI * 2
        );
        ctx.fill();

        if (active) {
          const beamGradient = ctx.createLinearGradient(obstacle.beamStartX, obstacle.beamY, obstacle.beamStartX + obstacle.beamLength, obstacle.beamY);
          beamGradient.addColorStop(0, "rgba(255, 244, 224, 0.98)");
          beamGradient.addColorStop(0.28, "rgba(255, 178, 92, 0.96)");
          beamGradient.addColorStop(0.7, "rgba(255, 114, 72, 0.85)");
          beamGradient.addColorStop(1, "rgba(255, 114, 72, 0.12)");
          ctx.fillStyle = beamGradient;
          ctx.fillRect(obstacle.beamStartX, obstacle.beamY, obstacle.beamLength, obstacle.beamThickness);

          ctx.fillStyle = "rgba(255, 250, 232, 0.68)";
          ctx.fillRect(
            obstacle.beamStartX,
            obstacle.beamY + obstacle.beamThickness * 0.3,
            obstacle.beamLength,
            obstacle.beamThickness * 0.4
          );
        } else {
          ctx.strokeStyle = "rgba(255, 190, 150, 0.35)";
          ctx.lineWidth = 2 * state.scale;
          ctx.beginPath();
          ctx.moveTo(obstacle.x + emitterSize * 0.72, obstacle.y + emitterSize * 0.5);
          ctx.lineTo(obstacle.x + emitterSize * 1.08, obstacle.y + emitterSize * 0.5);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawLaser(obstacle) {
        const emitterGlow = 0.78 + 0.22 * Math.sin(state.timeAlive * 7.4 + obstacle.x * 0.03);
        const emitterSize = GAME.laserEmitterSize * state.scale;
        ctx.save();
        ctx.shadowBlur = 18 * state.scale;
        ctx.shadowColor = "rgba(255, 66, 90, 0.44)";

        ctx.fillStyle = "#62111f";
        ctx.beginPath();
        ctx.roundRect(obstacle.x, obstacle.y, emitterSize, emitterSize, 8 * state.scale);
        ctx.fill();

        ctx.fillStyle = "#ff6c7d";
        ctx.beginPath();
        ctx.arc(
          obstacle.x + emitterSize * 0.52,
          obstacle.y + emitterSize * 0.5,
          emitterSize * 0.17 * emitterGlow,
          0,
          Math.PI * 2
        );
        ctx.fill();

        const beamGradient = ctx.createLinearGradient(obstacle.beamStartX, obstacle.beamY, obstacle.beamStartX + obstacle.beamLength, obstacle.beamY);
        beamGradient.addColorStop(0, "rgba(255, 220, 226, 0.94)");
        beamGradient.addColorStop(0.35, "rgba(255, 108, 125, 0.95)");
        beamGradient.addColorStop(1, "rgba(255, 72, 95, 0.18)");
        ctx.fillStyle = beamGradient;
        ctx.fillRect(obstacle.beamStartX, obstacle.beamY, obstacle.beamLength, obstacle.beamThickness);

        ctx.fillStyle = "rgba(255, 245, 247, 0.65)";
        ctx.fillRect(
          obstacle.beamStartX,
          obstacle.beamY + obstacle.beamThickness * 0.32,
          obstacle.beamLength,
          obstacle.beamThickness * 0.36
        );

        ctx.restore();
      }

      function drawGate(obstacle) {
        const innerInset = 6 * state.scale;
        const pulse = 0.7 + 0.3 * Math.sin(state.timeAlive * 6.4 + obstacle.x * 0.015);
        const isTracker = obstacle.type === "trackerGate";
        ctx.save();
        ctx.shadowBlur = 20 * state.scale;
        ctx.shadowColor = isTracker ? "rgba(255, 152, 72, 0.52)" : "rgba(255, 55, 70, 0.48)";

        const gateGradient = ctx.createLinearGradient(obstacle.x, obstacle.y, obstacle.x + obstacle.width, obstacle.y);
        if (isTracker) {
          gateGradient.addColorStop(0, "#7a2908");
          gateGradient.addColorStop(0.45, "#ff8a3d");
          gateGradient.addColorStop(1, "#8a330a");
        } else {
          gateGradient.addColorStop(0, "#6f0c1b");
          gateGradient.addColorStop(0.45, "#ff4056");
          gateGradient.addColorStop(1, "#7a1121");
        }
        ctx.fillStyle = gateGradient;
        ctx.beginPath();
        ctx.roundRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height, 10 * state.scale);
        ctx.fill();

        ctx.fillStyle = isTracker ? "rgba(255, 240, 220, 0.24)" : "rgba(255, 230, 234, 0.22)";
        ctx.beginPath();
        ctx.roundRect(
          obstacle.x + innerInset,
          obstacle.y + innerInset,
          obstacle.width - innerInset * 2,
          obstacle.height - innerInset * 2,
          8 * state.scale
        );
        ctx.fill();

        ctx.strokeStyle = isTracker ? "rgba(255, 246, 232, 0.84)" : "rgba(255, 245, 246, 0.72)";
        ctx.lineWidth = 2 * state.scale;
        for (let y = obstacle.y + 14 * state.scale; y < obstacle.y + obstacle.height - 10 * state.scale; y += 22 * state.scale) {
          ctx.beginPath();
          ctx.moveTo(obstacle.x + 7 * state.scale, y);
          ctx.lineTo(obstacle.x + obstacle.width - 7 * state.scale, y + 8 * state.scale * pulse);
          ctx.stroke();
        }

        if (isTracker) {
          ctx.strokeStyle = "rgba(255, 248, 236, 0.88)";
          ctx.lineWidth = 1.6 * state.scale;
          ctx.beginPath();
          ctx.moveTo(obstacle.x + obstacle.width * 0.5, obstacle.y + 10 * state.scale);
          ctx.lineTo(obstacle.x + obstacle.width * 0.5, obstacle.y + obstacle.height - 10 * state.scale);
          ctx.moveTo(obstacle.x + 8 * state.scale, obstacle.y + obstacle.height * 0.5);
          ctx.lineTo(obstacle.x + obstacle.width - 8 * state.scale, obstacle.y + obstacle.height * 0.5);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawLavaPit(obstacle) {
        ctx.save();
        ctx.shadowBlur = 12 * state.scale;
        ctx.shadowColor = "rgba(255, 70, 88, 0.24)";

        const bodyGradient = ctx.createLinearGradient(obstacle.x, obstacle.y, obstacle.x + obstacle.width, obstacle.y);
        bodyGradient.addColorStop(0, "#6f0c1b");
        bodyGradient.addColorStop(0.5, "#ff4056");
        bodyGradient.addColorStop(1, "#7a1121");
        ctx.fillStyle = bodyGradient;
        ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);

        ctx.fillStyle = "rgba(255, 236, 239, 0.18)";
        ctx.fillRect(
          obstacle.x + 6 * state.scale,
          obstacle.y + 6 * state.scale,
          Math.max(0, obstacle.width - 12 * state.scale),
          Math.max(0, obstacle.height - 12 * state.scale)
        );

        ctx.strokeStyle = "rgba(255, 246, 246, 0.64)";
        ctx.lineWidth = 1.6 * state.scale;
        for (let i = 0; i < obstacle.gateCount; i += 1) {
          const gateX = obstacle.x + i * (obstacle.gateWidth + obstacle.gateSpacing);
          ctx.beginPath();
          ctx.moveTo(gateX + obstacle.gateWidth * 0.5, obstacle.y + 10 * state.scale);
          ctx.lineTo(gateX + obstacle.gateWidth * 0.5, obstacle.y + obstacle.gateHeight - 10 * state.scale);
          ctx.stroke();
        }

        ctx.strokeStyle = "rgba(255, 232, 236, 0.48)";
        for (let y = obstacle.y + 14 * state.scale; y < obstacle.y + obstacle.height - 10 * state.scale; y += 22 * state.scale) {
          ctx.beginPath();
          ctx.moveTo(obstacle.x + 8 * state.scale, y);
          ctx.lineTo(obstacle.x + obstacle.width - 8 * state.scale, y + 7 * state.scale);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawProjectiles() {
        for (const projectile of state.projectiles) {
          const glow = ctx.createRadialGradient(
            projectile.x - projectile.radius * 0.25,
            projectile.y - projectile.radius * 0.25,
            projectile.radius * 0.2,
            projectile.x,
            projectile.y,
            projectile.radius * 1.8
          );
          glow.addColorStop(0, projectile.colorInner);
          glow.addColorStop(0.45, projectile.colorOuter);
          glow.addColorStop(1, "rgba(255, 50, 70, 0)");
          ctx.save();
          ctx.shadowBlur = 16 * state.scale;
          ctx.shadowColor = projectile.glow;
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(projectile.x, projectile.y, projectile.radius * 1.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawExplosion() {
        if (!state.explosion.active) {
          return;
        }

        const progress = state.explosion.timer / state.explosion.duration;
        const shockRadius = (12 + progress * 54) * state.scale;
        const shockAlpha = Math.max(0, 0.62 - progress * 0.82);

        ctx.save();
        ctx.lineWidth = 4 * state.scale * (1 - progress * 0.45);
        ctx.strokeStyle = "rgba(255, 225, 190, " + shockAlpha + ")";
        ctx.beginPath();
        ctx.arc(state.explosion.x, state.explosion.y, shockRadius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 234, 190, " + Math.max(0, 0.35 - progress * 0.4) + ")";
        ctx.beginPath();
        ctx.arc(state.explosion.x, state.explosion.y, 10 * state.scale * (1 - progress * 0.35), 0, Math.PI * 2);
        ctx.fill();

        for (const particle of state.explosion.particles) {
          if (particle.type === "smoke") {
            ctx.fillStyle = particle.color;
            ctx.globalAlpha = particle.life * 0.7;
            ctx.beginPath();
            ctx.ellipse(
              particle.x,
              particle.y,
              particle.radius * 0.95,
              particle.radius * 1.35,
              0,
              0,
              Math.PI * 2
            );
            ctx.fill();
          } else {
            ctx.fillStyle = particle.color;
            ctx.globalAlpha = particle.life;
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.radius * particle.life, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();
      }

      function drawTrail(palette) {
        const ballColors = currentBallColors();
        for (let i = 0; i < state.trail.length; i += 1) {
          const point = state.trail[i];
          const alpha = point.life * (1 - i / state.trail.length) * 0.18;
          const radius = GAME.playerRadius * state.scale * (1 - i / (state.trail.length + 2));
          ctx.fillStyle = ballColors.ballGlow.replace("0.55", String(alpha)).replace("0.35", String(alpha));
          ctx.beginPath();
          ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawPlayer(palette) {
        const ballColors = currentBallColors();
        const px = playerX();
        const radius = GAME.playerRadius * state.scale;
        if (state.arrowMode) {
          drawArrowPlayer(palette, ballColors, px, radius);
          return;
        }
        if (state.shipMode) {
          drawShipPlayer(palette, ballColors, px, radius);
          return;
        }
        const pulse = 1 + Math.sin(state.timeAlive * GAME.visualPulseSpeed) * 0.025;
        const glow = ctx.createRadialGradient(
          px - radius * 0.35,
          state.playerY - radius * 0.45,
          radius * 0.2,
          px,
          state.playerY,
          radius * 1.45
        );
        glow.addColorStop(0, ballColors.ballCore);
        glow.addColorStop(0.6, ballColors.ballCore);
        glow.addColorStop(1, ballColors.ballEdge);

        ctx.save();
        ctx.shadowBlur = 26 * state.scale;
        ctx.shadowColor = ballColors.ballGlow;
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(px, state.playerY, radius * pulse, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = ballColors === THEMES.white ? "rgba(255,255,255,0.3)" : "rgba(255,255,255,0.14)";
        ctx.beginPath();
        ctx.arc(px - radius * 0.28, state.playerY - radius * 0.35, radius * 0.32, 0, Math.PI * 2);
        ctx.fill();

        if (!state.canFlip && state.state === "playing") {
          ctx.strokeStyle = palette.uiSubtle;
          ctx.lineWidth = 3 * state.scale;
          ctx.beginPath();
          ctx.arc(px, state.playerY, radius * 1.3, -Math.PI * 0.45, Math.PI * 0.45);
          ctx.stroke();
        }

        if (state.runShieldReady || state.invulnerableTimer > 0) {
          const shieldAlpha = state.invulnerableTimer > 0
            ? 0.45 + 0.35 * Math.sin(state.timeAlive * 20)
            : 0.34;
          ctx.save();
          ctx.strokeStyle = "rgba(110, 225, 255, " + shieldAlpha + ")";
          ctx.lineWidth = 4 * state.scale;
          ctx.shadowBlur = 16 * state.scale;
          ctx.shadowColor = "rgba(110, 225, 255, 0.35)";
          ctx.beginPath();
          ctx.arc(px, state.playerY, radius * 1.55, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawJoinedGuests() {
        if (!state.joinedGuests.length) {
          return;
        }
        const px = playerX();
        const baseRadius = GAME.playerRadius * state.scale;
        state.joinedGuests.forEach((guest, index) => {
          const orbitRadius = (38 + index * 12) * state.scale;
          const orbitAngle = state.timeAlive * (1.4 + index * 0.18) + guest.orbitOffset;
          const gx = px + Math.cos(orbitAngle) * orbitRadius;
          const gy = state.playerY + Math.sin(orbitAngle * 1.15) * (14 + index * 4) * state.scale;
          const flash = 0.5 + 0.5 * Math.sin(state.timeAlive * 8 + guest.pulseOffset);
          const inner = flash > 0.5 ? guest.colors[0] : guest.colors[1];
          const outer = flash > 0.5 ? guest.colors[1] : guest.colors[0];
          const guestGlow = ctx.createRadialGradient(gx, gy, baseRadius * 0.12, gx, gy, baseRadius * 0.92);
          guestGlow.addColorStop(0, inner);
          guestGlow.addColorStop(1, outer);
          ctx.save();
          ctx.shadowBlur = 14 * state.scale;
          ctx.shadowColor = outer;
          ctx.fillStyle = guestGlow;
          ctx.beginPath();
          ctx.arc(gx, gy, baseRadius * 0.38, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });
      }

      function drawArrowPlayer(palette, ballColors, px, radius) {
        const arrowLength = radius * 2.5;
        const arrowHeight = radius * 1.15;
        const glowAlpha = state.heldKeys.KeyA ? 0.9 : 0.55;

        ctx.save();
        ctx.translate(px, state.playerY);
        ctx.shadowBlur = 24 * state.scale;
        ctx.shadowColor = ballColors.ballGlow;

        ctx.fillStyle = ballColors.ballCore;
        ctx.beginPath();
        ctx.moveTo(arrowLength * 0.72, 0);
        ctx.lineTo(-arrowLength * 0.06, -arrowHeight * 0.82);
        ctx.lineTo(-arrowLength * 0.06, -arrowHeight * 0.34);
        ctx.lineTo(-arrowLength * 0.78, -arrowHeight * 0.34);
        ctx.lineTo(-arrowLength * 0.78, arrowHeight * 0.34);
        ctx.lineTo(-arrowLength * 0.06, arrowHeight * 0.34);
        ctx.lineTo(-arrowLength * 0.06, arrowHeight * 0.82);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = ballColors.ballEdge;
        ctx.beginPath();
        ctx.moveTo(arrowLength * 0.28, 0);
        ctx.lineTo(-arrowLength * 0.18, -arrowHeight * 0.44);
        ctx.lineTo(-arrowLength * 0.18, arrowHeight * 0.44);
        ctx.closePath();
        ctx.fill();

        ctx.globalAlpha = glowAlpha;
        ctx.fillStyle = palette.uiSubtle;
        ctx.beginPath();
        ctx.arc(-arrowLength * 0.38, 0, radius * 0.18, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawShipPlayer(palette, ballColors, px, radius) {
        const shipWidth = radius * 2.35;
        const shipHeight = radius * 1.45;
        const thrusting = state.heldKeys.ArrowUp || state.heldKeys.ArrowDown || state.heldKeys.ArrowLeft || state.heldKeys.ArrowRight;

        ctx.save();
        ctx.translate(px, state.playerY);
        ctx.shadowBlur = 22 * state.scale;
        ctx.shadowColor = ballColors.ballGlow;

        if (thrusting) {
          ctx.fillStyle = "rgba(255, 128, 72, 0.82)";
          ctx.beginPath();
          ctx.moveTo(-shipWidth * 0.58, 0);
          ctx.lineTo(-shipWidth * 0.95, -shipHeight * 0.24);
          ctx.lineTo(-shipWidth * 0.95, shipHeight * 0.24);
          ctx.closePath();
          ctx.fill();
        }

        ctx.fillStyle = ballColors.ballCore;
        ctx.beginPath();
        ctx.moveTo(shipWidth * 0.62, 0);
        ctx.lineTo(-shipWidth * 0.22, -shipHeight * 0.58);
        ctx.quadraticCurveTo(-shipWidth * 0.7, 0, -shipWidth * 0.22, shipHeight * 0.58);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = ballColors.ballEdge;
        ctx.beginPath();
        ctx.moveTo(shipWidth * 0.18, 0);
        ctx.lineTo(-shipWidth * 0.12, -shipHeight * 0.34);
        ctx.lineTo(-shipWidth * 0.12, shipHeight * 0.34);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = palette.uiSubtle;
        ctx.beginPath();
        ctx.arc(shipWidth * 0.02, 0, radius * 0.28, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawHud(palette) {
        const pad = 26 * state.scale;
        ctx.fillStyle = palette.ui;
        ctx.font = Math.max(20, 22 * state.scale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
        ctx.textAlign = "left";
        ctx.fillText("Score " + Math.floor(state.score), pad, pad + 8 * state.scale);
        ctx.font = Math.max(14, 16 * state.scale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
        ctx.fillText("Diamonds " + formatDiamonds(state.diamonds), pad, pad + 34 * state.scale);
        ctx.textAlign = "right";
        ctx.fillText("Best " + Math.floor(state.bestScore), state.width - pad, pad + 8 * state.scale);
        ctx.font = Math.max(14, 16 * state.scale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
        ctx.fillText("Guests " + state.joinedGuests.length, state.width - pad, pad + 34 * state.scale);

        ctx.font = Math.max(13, 14 * state.scale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
        ctx.fillStyle = palette.uiSubtle;
        ctx.textAlign = "center";
        const secondsToSwap = Math.ceil(GAME.modeSwapSeconds - state.modeTimer);
        if (state.state === "playing") {
          const middleText = state.middleModeTimer > 0
            ? "  |  Middle mode " + state.middleModeTimer.toFixed(1) + "s"
            : "";
          const shipText = state.shipMode ? "  |  Ship mode" : "";
          const arrowText = state.arrowMode ? "  |  Arrow mode" : "";
          const shieldText = state.runShieldReady ? "  |  Shield ready" : "";
          const antiCampText = state.antiCampTimer > 0.35
            ? "  |  Move " + Math.max(0, GAME.antiCampSeconds - state.antiCampTimer).toFixed(1) + "s"
            : "";
          ctx.fillText(
            palette.modeName + "  |  Next swap in " + secondsToSwap + "s" + middleText + shipText + arrowText + shieldText + antiCampText,
            state.width * 0.5,
            pad + 6 * state.scale
          );
        }
      }

      function buildMenuButtons(sectionX, panelY, sectionWidth, uiScale) {
        const buttonWidth = Math.min(sectionWidth * 0.44, 220 * uiScale);
        const buttonHeight = 56 * uiScale;
        const gapX = 22 * uiScale;
        const gapY = 16 * uiScale;
        const startX = sectionX + (sectionWidth - (buttonWidth * 2 + gapX)) * 0.5;
        const startY = panelY + 116 * uiScale;
        return DIFFICULTY_OPTIONS.map((option, index) => ({
          id: option.id,
          label: option.label,
          x: startX + (index % 2) * (buttonWidth + gapX),
          y: startY + Math.floor(index / 2) * (buttonHeight + gapY),
          width: buttonWidth,
          height: buttonHeight
        }));
      }

      function buildShopButtons(sectionX, startY, sectionWidth, uiScale) {
        const buttonWidth = Math.min(sectionWidth * 0.84, 360 * uiScale);
        const buttonHeight = 42 * uiScale;
        const startX = sectionX + (sectionWidth - buttonWidth) * 0.5;
        return SHOP_ITEMS.map((item, index) => ({
          id: item.id,
          label: item.label,
          x: startX,
          y: startY + index * (buttonHeight + 10 * uiScale),
          width: buttonWidth,
          height: buttonHeight
        }));
      }

      function buildLobbyButtons(sectionX, startY, sectionWidth, uiScale) {
        const wideWidth = Math.min(sectionWidth * 0.84, 360 * uiScale);
        const smallWidth = (wideWidth - 10 * uiScale) * 0.5;
        const centerX = sectionX + (sectionWidth - wideWidth) * 0.5;
        return [
          {
            id: "host",
            label: "Host Local Room",
            x: centerX,
            y: startY,
            width: wideWidth,
            height: 44 * uiScale
          },
          {
            id: "join",
            label: "Join Preview",
            x: centerX,
            y: startY + 54 * uiScale,
            width: smallWidth,
            height: 40 * uiScale
          },
          {
            id: "clearGuests",
            label: "Clear Guests",
            x: centerX + smallWidth + 10 * uiScale,
            y: startY + 54 * uiScale,
            width: smallWidth,
            height: 40 * uiScale
          }
        ];
      }

      function drawRectButton(button, palette, accentColor, uiScale, subLabel = "") {
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.roundRect(button.x, button.y, button.width, button.height, 14 * uiScale);
        ctx.fill();
        ctx.strokeStyle = accentColor;
        ctx.lineWidth = 2 * uiScale;
        ctx.stroke();
        ctx.restore();

        ctx.textAlign = "center";
        ctx.fillStyle = palette.ui;
        ctx.font = "700 " + Math.max(14, 17 * uiScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
        ctx.fillText(button.label, button.x + button.width * 0.5, button.y + button.height * 0.45);
        if (subLabel) {
          ctx.fillStyle = palette.uiSubtle;
          ctx.font = Math.max(11, 12 * uiScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
          ctx.fillText(subLabel, button.x + button.width * 0.5, button.y + button.height * 0.78);
        }
      }

      function drawMenuButtons(palette, uiScale) {
        for (const button of state.menuButtons) {
          const selected = button.id === selectedDifficultyId();
          const fill = selected ? "rgba(255, 143, 90, 0.32)" : "rgba(255,255,255,0.08)";
          const stroke = selected ? "rgba(255, 202, 162, 0.84)" : "rgba(255,255,255,0.16)";
          ctx.save();
          ctx.shadowBlur = selected ? 18 * uiScale : 0;
          ctx.shadowColor = selected ? "rgba(255, 146, 84, 0.28)" : "transparent";
          ctx.fillStyle = fill;
          ctx.beginPath();
          ctx.roundRect(button.x, button.y, button.width, button.height, 16 * uiScale);
          ctx.fill();
          ctx.strokeStyle = stroke;
          ctx.lineWidth = 2 * uiScale;
          ctx.stroke();
          ctx.restore();

          ctx.fillStyle = selected ? palette.ui : palette.uiSubtle;
          ctx.font = "700 " + Math.max(16, 20 * uiScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
          ctx.fillText(button.label, button.x + button.width * 0.5, button.y + button.height * 0.62);
        }
      }

      function drawShopButtons(palette, uiScale) {
        for (const button of state.shopButtons) {
          const item = SHOP_ITEMS.find((shopItem) => shopItem.id === button.id);
          const inventoryCount = state.powerupInventory[button.id];
          const armed = state.selectedPowerups[button.id];
          const accent = armed
            ? "rgba(255, 205, 110, 0.8)"
            : inventoryCount > 0
              ? "rgba(92, 230, 153, 0.72)"
              : "rgba(118, 190, 255, 0.72)";
          const subLabel = armed
            ? "Armed for next level"
            : inventoryCount > 0
              ? "Owned x" + inventoryCount + "  |  tap to arm"
              : formatDiamonds(item.cost) + " diamonds";
          drawRectButton(button, palette, accent, uiScale, subLabel);
        }
      }

      function drawLobbyButtons(palette, uiScale) {
        for (const button of state.lobbyButtons) {
          const accent = button.id === "host"
            ? "rgba(255, 176, 92, 0.78)"
            : button.id === "join"
              ? "rgba(174, 122, 255, 0.78)"
              : "rgba(255,255,255,0.28)";
          drawRectButton(button, palette, accent, uiScale);
        }
      }

      function drawMenuHelpPanel(palette, x, y, width, height, uiScale) {
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.06)";
        ctx.beginPath();
        ctx.roundRect(x, y, width, height, 20 * uiScale);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.lineWidth = 2 * uiScale;
        ctx.stroke();

        ctx.textAlign = "left";
        ctx.fillStyle = palette.ui;
        ctx.font = "700 " + Math.max(18, 24 * uiScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
        ctx.fillText("Everything You Can Do", x + 22 * uiScale, y + 34 * uiScale);

        const lines = [
          "SPACE: flip gravity after landing",
          "W: short hop opposite gravity",
          "R: restart after game over",
          "ESC: open the main menu",
          "SPACE + X: middle mode for 10 seconds",
          "Z: stop middle mode",
          "T + Y: ship mode",
          "Arrow keys: steer ship mode",
          "G: stop ship mode",
          "Q: arrow mode",
          "A held: arrow goes diagonally up",
          "Release A: arrow goes diagonally down",
          "E: stop arrow mode",
          "Diamonds buy one-level power up charges",
          "Host Local Room makes a 15-digit code",
          "Join Preview adds flashing local guest colors",
          "Left tap: flip gravity",
          "Right tap: hop",
          "White and black ball colors swap over time",
          "Pick Easy, Middle, Hard, or Difficlt here"
        ];

        ctx.fillStyle = palette.uiSubtle;
        ctx.font = Math.max(13, 16 * uiScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
        lines.forEach((line, index) => {
          ctx.fillText(line, x + 22 * uiScale, y + (68 + index * 21) * uiScale);
        });
        ctx.restore();
      }

      function drawStateOverlay(palette) {
        if (state.state === "playing" || state.state === "dying") {
          state.menuButtons = [];
          state.shopButtons = [];
          state.lobbyButtons = [];
          return;
        }

        ctx.fillStyle = state.state === "start" || state.state === "menu" ? "rgba(3, 6, 18, 0.3)" : "rgba(5, 8, 20, 0.42)";
        ctx.fillRect(0, 0, state.width, state.height);

        const centerX = state.width * 0.5;
        const centerY = state.height * 0.5;
        const menuFitScale = Math.min(1, (state.height * 0.94) / (880 * state.scale));
        const menuScale = state.scale * menuFitScale;
        const panelWidth = Math.min(state.width * 0.94, 1060 * menuScale);
        const panelHeight = state.state === "start" || state.state === "menu" ? 880 * menuScale : 320 * state.scale;
        const panelX = centerX - panelWidth * 0.5;
        const panelY = centerY - panelHeight * 0.5;

        const panelGradient = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelHeight);
        panelGradient.addColorStop(0, "rgba(255,255,255,0.14)");
        panelGradient.addColorStop(1, "rgba(255,255,255,0.06)");
        ctx.fillStyle = panelGradient;
        ctx.beginPath();
        ctx.roundRect(panelX, panelY, panelWidth, panelHeight, 28 * menuScale);
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 2 * menuScale;
        ctx.stroke();

        ctx.textAlign = "center";
        ctx.fillStyle = palette.ui;
        ctx.font = "700 " + Math.max(34, 54 * menuScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
        ctx.fillText(state.state === "gameover" ? "Game Over" : state.state === "menu" ? "Main Menu" : "Space Ball", centerX, panelY + 74 * menuScale);

        ctx.font = Math.max(16, 22 * menuScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
        ctx.fillStyle = palette.uiSubtle;

        if (state.state === "start" || state.state === "menu") {
          const leftWidth = panelWidth * 0.52;
          const rightX = panelX + leftWidth + 18 * menuScale;
          const rightWidth = panelWidth - leftWidth - 18 * menuScale;
          const summaryStartY = panelY + 294 * menuScale;
          const shopTitleY = panelY + 462 * menuScale;
          const shopButtonsY = shopTitleY + 18 * menuScale;
          const lobbyTitleY = panelY + 636 * menuScale;
          const lobbyButtonsY = lobbyTitleY + 18 * menuScale;
          state.menuButtons = buildMenuButtons(panelX, panelY, leftWidth, menuScale);
          state.shopButtons = buildShopButtons(panelX, shopButtonsY, leftWidth, menuScale);
          state.lobbyButtons = buildLobbyButtons(panelX, lobbyButtonsY, leftWidth, menuScale);
          drawMenuButtons(palette, menuScale);
          drawShopButtons(palette, menuScale);
          drawLobbyButtons(palette, menuScale);
          drawMenuHelpPanel(
            palette,
            rightX,
            panelY + 104 * menuScale,
            rightWidth,
            panelHeight - 154 * menuScale,
            menuScale
          );

          ctx.fillStyle = palette.ui;
          ctx.font = "700 " + Math.max(16, 20 * menuScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
          ctx.fillText("Current difficulty: " + selectedDifficultyLabel(), panelX + leftWidth * 0.5, panelY + 252 * menuScale);
          ctx.fillText("Diamonds: " + formatDiamonds(state.diamonds), panelX + leftWidth * 0.5, panelY + 286 * menuScale);

          ctx.fillStyle = palette.uiSubtle;
          ctx.font = Math.max(13, 16 * menuScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
          const lines = [
            "Easy: platforms and spikes only.",
            "Middle: adds gates, shooters, lazers, and blasters.",
            "Hard: adds tracker shooters and tracker gates.",
            "Difficlt: adds lava pits.",
            "Buy charges here, then arm them for the next level.",
            "Shield: 19,364  |  Score Boost: 12,744",
            "Slow Field: 12,056  |  charges are consumed on start.",
            "Host and join here are local preview features in this single HTML file."
          ];
          lines.forEach((line, index) => {
            ctx.fillText(line, panelX + leftWidth * 0.5, summaryStartY + index * 22 * menuScale);
          });
          ctx.fillStyle = palette.ui;
          ctx.font = "700 " + Math.max(15, 18 * menuScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
          ctx.fillText("Power Ups", panelX + leftWidth * 0.5, shopTitleY);
          ctx.fillText("Local Room", panelX + leftWidth * 0.5, lobbyTitleY);
          ctx.fillStyle = palette.ui;
          ctx.font = "700 " + Math.max(14, 16 * menuScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
          ctx.fillText("Host code: " + state.hostCode, panelX + leftWidth * 0.5, panelY + 788 * menuScale);
          ctx.fillStyle = palette.uiSubtle;
          ctx.font = Math.max(12, 14 * menuScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
          ctx.fillText("Guest previews: " + state.joinedGuests.length, panelX + leftWidth * 0.5, panelY + 812 * menuScale);
          if (state.menuNotice) {
            ctx.fillStyle = palette.ui;
            ctx.font = Math.max(12, 14 * menuScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
            ctx.fillText(state.menuNotice, panelX + leftWidth * 0.5, panelY + 836 * menuScale);
          }
          ctx.fillStyle = palette.ui;
          ctx.font = "700 " + Math.max(18, 24 * menuScale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
          ctx.fillText(
            state.state === "menu" ? "Choose a difficulty button, then press W to begin" : "Press W to begin",
            panelX + leftWidth * 0.5,
            panelY + panelHeight - 24 * menuScale
          );
        } else {
          state.menuButtons = [];
          state.shopButtons = [];
          state.lobbyButtons = [];
          ctx.fillText("Final score " + Math.floor(state.score), centerX, panelY + 132 * state.scale);
          ctx.fillText("You were hit by " + (state.deathCause || "a hazard"), centerX, panelY + 166 * state.scale);
          ctx.fillText("Diamonds earned " + Math.floor(state.runDiamondsEarned), centerX, panelY + 200 * state.scale);
          ctx.fillText("Best score " + Math.floor(state.bestScore), centerX, panelY + 234 * state.scale);
          ctx.fillStyle = palette.ui;
          ctx.font = "700 " + Math.max(18, 24 * state.scale) + "px " + getComputedStyle(document.documentElement).getPropertyValue("--font-display");
          ctx.fillText("Press R to restart or Esc for menu", centerX, panelY + panelHeight - 42 * state.scale);
        }
      }

      function frame(timestamp) {
        if (!state.lastTimestamp) {
          state.lastTimestamp = timestamp;
        }
        const dt = Math.min(0.033, (timestamp - state.lastTimestamp) / 1000);
        state.lastTimestamp = timestamp;
        update(dt);
        draw();
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("keydown", onKeyDown, { passive: false });
      window.addEventListener("keyup", onKeyUp, { passive: true });
      window.addEventListener("pointerdown", onPointerDown, { passive: true });

      resize();
      draw();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
